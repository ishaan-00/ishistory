<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>ishistory CMS</title>
  <style>
    #ih-bar { position:fixed; bottom:0; left:0; right:0; z-index:99999; font-family:'SF Mono','Fira Code',ui-monospace,monospace; font-size:11px; line-height:1.4; }
    #ih-strip { background:#0f172a; border-top:1px solid #1e293b; padding:6px 12px; display:flex; align-items:center; gap:8px; cursor:pointer; transition:background 0.2s; }
    #ih-strip:hover { background:#1e293b; }
    #ih-strip.offline { background:#450a0a; border-top-color:#7f1d1d; }
    #ih-panel { background:#020617; border-top:1px solid #1e293b; padding:12px; display:none; max-height:70vh; overflow-y:auto; }
    #ih-panel.open { display:block; }
    .ih-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:4px; flex-shrink:0; }
    .ih-dot.green  { background:#22c55e; box-shadow:0 0 6px #22c55e; }
    .ih-dot.red    { background:#ef4444; box-shadow:0 0 6px #ef4444; }
    .ih-dot.yellow { background:#eab308; box-shadow:0 0 6px #eab308; }
    .ih-dot.blue   { background:#3b82f6; box-shadow:0 0 6px #3b82f6; }
    .ih-dot.gray   { background:#334155; }
    .ih-dot.pulse  { animation:ih-pulse 2s ease-in-out infinite; }
    @keyframes ih-pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .ih-spin { display:inline-block; width:10px; height:10px; border:2px solid rgba(255,255,255,.2); border-top-color:#fff; border-radius:50%; animation:ih-spin-r .7s linear infinite; }
    @keyframes ih-spin-r { to{transform:rotate(360deg)} }
    .ih-val   { color:#94a3b8; }
    .ih-label { color:#64748b; font-size:10px; text-transform:uppercase; letter-spacing:.5px; }
    .ih-section { margin-bottom:14px; }
    .ih-section-title { color:#e2e8f0; font-weight:600; margin-bottom:6px; font-size:11px; border-bottom:1px solid #1e293b; padding-bottom:4px; }
    .ih-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px solid #0f172a; }
    .ih-row:last-child { border-bottom:none; }
    .ih-actions { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
    .ih-btn { background:#1e293b; color:#e2e8f0; border:1px solid #334155; padding:4px 10px; border-radius:4px; cursor:pointer; font-size:11px; font-family:inherit; transition:all .2s; white-space:nowrap; }
    .ih-btn:hover:not(:disabled) { background:#334155; border-color:#475569; }
    .ih-btn:disabled { opacity:.5; cursor:not-allowed; }
    .ih-btn.ok   { background:#166534; color:#86efac; border-color:#166534; }
    .ih-btn.fail { background:#7f1d1d; color:#fca5a5; border-color:#7f1d1d; }
    .ih-btn.warn { border-color:#7f1d1d; color:#fca5a5; }
    .ih-btn.warn:hover:not(:disabled) { background:#7f1d1d; color:#fca5a5; }
    .ih-series-card { background:#0f172a; border:1px solid #1e293b; border-radius:4px; padding:8px 10px; margin-bottom:6px; }
    .ih-series-card.complete { border-color:#166534; }
    .ih-series-card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
    .ih-series-name { color:#7dd3fc; font-weight:600; }
    .ih-series-card.complete .ih-series-name { color:#4ade80; }
    .ih-badge { font-size:9px; padding:1px 6px; border-radius:10px; font-weight:600; }
    .ih-badge.active   { background:#0f2a4a; color:#38bdf8; }
    .ih-badge.complete { background:#052e16; color:#4ade80; }
    .ih-series-stats { color:#64748b; font-size:10px; display:flex; gap:10px; flex-wrap:wrap; }
    .ih-series-next { color:#22c55e; }
    .ih-series-gap  { color:#f59e0b; }
    .ih-series-done { color:#4ade80; }
    .ih-series-actions { margin-top:6px; }
    .ih-series-btn { font-size:9px; padding:2px 8px; border-radius:3px; border:1px solid #1e293b; background:#0f172a; color:#475569; cursor:pointer; font-family:inherit; transition:all .15s; }
    .ih-series-btn:hover { background:#1e293b; color:#94a3b8; }
    .ih-cron-row { display:flex; align-items:center; gap:8px; padding:3px 0; border-bottom:1px solid #0f172a; font-size:10px; }
    .ih-cron-row:last-child { border-bottom:none; }
    .ih-cron-time { color:#475569; width:55px; flex-shrink:0; }
    .ih-cron-pub  { color:#22c55e; }
    .ih-cron-del  { color:#f59e0b; }
    .ih-cron-fail { color:#ef4444; }
    .ih-cron-idle { color:#1e293b; }
    .ih-cron-files { color:#334155; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
    .ih-act-row { display:flex; align-items:center; gap:8px; padding:3px 0; border-bottom:1px solid #0f172a; font-size:10px; }
    .ih-act-row:last-child { border-bottom:none; }
    .ih-act-icon { width:12px; text-align:center; flex-shrink:0; }
    .ih-act-path { color:#475569; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .ih-act-time { color:#334155; flex-shrink:0; }
    .ih-staged-row { display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid #0f172a; font-size:10px; }
    .ih-staged-path { color:#7dd3fc; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
    .ih-staged-size { color:#334155; flex-shrink:0; margin-left:8px; }
    .ih-empty { color:#334155; font-size:10px; padding:4px 0; }
    #s-toggle { margin-left:auto; background:none; border:none; color:#475569; cursor:pointer; font-size:10px; font-family:inherit; padding:0 0 0 8px; flex-shrink:0; }
    #s-toggle:hover { color:#94a3b8; }
    @media (max-width:640px) { #ih-strip { flex-wrap:wrap; gap:6px; } }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js" type="module" data-cfasync="false"></script>

  <div id="ih-bar">
    <div id="ih-panel">
      <div class="ih-section">
        <div class="ih-section-title">System Status</div>
        <div class="ih-row"><span class="ih-label">Worker</span><span><span class="ih-dot gray" id="p-worker-dot"></span><span class="ih-val" id="p-worker-val">—</span></span></div>
        <div class="ih-row"><span class="ih-label">GitHub</span><span><span class="ih-dot gray" id="p-github-dot"></span><span class="ih-val" id="p-github-val">—</span></span></div>
        <div class="ih-row"><span class="ih-label">D1</span><span><span class="ih-dot gray" id="p-d1-dot"></span><span class="ih-val" id="p-d1-val">—</span></span></div>
        <div class="ih-row"><span class="ih-label">Claude</span><span><span class="ih-dot gray" id="p-claude-dot"></span><span class="ih-val" id="p-claude-val">—</span></span></div>
        <div class="ih-row"><span class="ih-label">Queue</span><span><span class="ih-dot gray" id="p-queue-dot"></span><span class="ih-val" id="p-queue-val">—</span></span></div>
        <div class="ih-row"><span class="ih-label">Cron</span><span><span class="ih-dot gray" id="p-cron-dot"></span><span class="ih-val" id="p-cron-val">—</span></span></div>
        <div class="ih-row"><span class="ih-label">Dead</span><span><span class="ih-dot gray" id="p-dead-dot"></span><span class="ih-val" id="p-dead-val">—</span></span></div>
        <div class="ih-row"><span class="ih-label">Gaps</span><span><span class="ih-dot gray" id="p-gaps-dot"></span><span class="ih-val" id="p-gaps-val">—</span></span></div>
      </div>
      <div class="ih-section">
        <div class="ih-section-title">Actions</div>
        <div class="ih-actions">
          <button class="ih-btn" data-action="trigger-cron">▶ Run Cron</button>
          <button class="ih-btn" data-action="process-staged">⬆ Publish Staged (<span id="btn-staged-count">0</span>)</button>
          <button class="ih-btn warn" data-action="clear-dead-letter">✕ Clear Failed</button>
        </div>
      </div>
      <div class="ih-section" id="section-staged" style="display:none">
        <div class="ih-section-title">Staged Drafts <span id="staged-count-label" style="color:#64748b;font-weight:400"></span></div>
        <div id="staged-list"></div>
      </div>
      <div class="ih-section">
        <div class="ih-section-title">Series <span id="series-summary" style="color:#64748b;font-weight:400"></span></div>
        <div id="series-list"><div class="ih-empty">Loading...</div></div>
      </div>
      <div class="ih-section">
        <div class="ih-section-title">Cron Log <span style="color:#64748b;font-weight:400">last 5 runs</span></div>
        <div id="cron-list"><div class="ih-empty">No runs yet</div></div>
      </div>
      <div class="ih-section">
        <div class="ih-section-title">Activity <span style="color:#64748b;font-weight:400">last 10 events</span></div>
        <div id="activity-list"><div class="ih-empty">No activity yet</div></div>
      </div>
    </div>
    <div id="ih-strip">
      <span class="ih-label">ishistory</span>
      <span style="color:#1e293b">|</span>
      <span id="s-spin"><span class="ih-spin"></span></span>
      <span class="ih-dot gray pulse" id="s-main" style="display:none"></span>
      <span id="s-staged" style="display:none"></span>
      <span id="s-dead"   style="display:none"></span>
      <span id="s-gaps"   style="display:none"></span>
      <span id="s-retry"  style="display:none"></span>
      <span class="ih-val" id="s-time" style="font-size:9px;color:#334155">connecting…</span>
      <button id="s-toggle" aria-expanded="false" aria-controls="ih-panel">▲ Status</button>
    </div>
  </div>

  <script>
    const WORKER  = 'https://claude.ishaan00.workers.dev';
    const BASE_MS = 90000;
    const MAX_MS  = 300000;

    let panelOpen = false;
    let failCount = 0;
    let pollTimer = null;

    // ── Helpers ───────────────────────────────────────────────────────────────
    function esc(s){const d=document.createElement('div');d.textContent=String(s??'');return d.innerHTML;}
    function $(id){return document.getElementById(id);}
    function dot(id,c){const e=$(id);if(e){e.className='ih-dot '+c;e.style.display='inline-block';}}
    function set(id,t){const e=$(id);if(e)e.textContent=t;}
    function htm(id,m){const e=$(id);if(e)e.innerHTML=m;}
    function show(id,m){const e=$(id);if(!e)return;e.style.display='inline';if(m!==undefined)e.innerHTML=m;}
    function showB(id){const e=$(id);if(e)e.style.display='block';}
    function hide(id){const e=$(id);if(e)e.style.display='none';}
    function fname(p){return esc(String(p).split('/').pop());}
    function rel(iso){
      if(!iso)return'never';
      const d=Math.floor((Date.now()-new Date(iso).getTime())/1000);
      if(d<60)return d+'s ago';
      if(d<3600)return Math.floor(d/60)+'m ago';
      if(d<86400)return Math.floor(d/3600)+'h ago';
      return Math.floor(d/86400)+'d ago';
    }
    function connSt(c){
      if(!c||c.status==='never')return{color:'gray',text:'never'};
      if(c.status==='active')return{color:'green',text:'active · '+rel(c.last_seen)};
      if(c.status==='idle')return{color:'yellow',text:'idle · '+rel(c.last_seen)};
      return{color:'red',text:'offline · '+rel(c.last_seen)};
    }

    // ── Toggle ────────────────────────────────────────────────────────────────
    function ihToggle(){
      panelOpen=!panelOpen;
      $('ih-panel').classList.toggle('open',panelOpen);
      const btn=$('s-toggle');
      btn.textContent=panelOpen?'▼ Status':'▲ Status';
      btn.setAttribute('aria-expanded',String(panelOpen));
    }
    $('ih-strip').addEventListener('click',ihToggle);
    document.addEventListener('keydown',e=>{if(e.key==='Escape'&&panelOpen)ihToggle();});

    // ── Event delegation ──────────────────────────────────────────────────────
    document.querySelector('.ih-actions').addEventListener('click',e=>{
      const btn=e.target.closest('[data-action]');
      if(!btn||btn.disabled)return;
      ihAction(btn.dataset.action,btn);
    });
    $('series-list').addEventListener('click',e=>{
      const btn=e.target.closest('.ih-series-btn');
      if(!btn||btn.disabled)return;
      const{seriesName,seriesAction}=btn.dataset;
      if(seriesName&&seriesAction)toggleSeries(seriesName,seriesAction,btn);
    });

    // ── Actions ───────────────────────────────────────────────────────────────
    async function ihAction(type,btn){
      btn.disabled=true;const orig=btn.innerHTML;btn.textContent='...';
      try{
        const r=await fetch(`${WORKER}/claude/action`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:type})});
        if(!r.ok)throw new Error('HTTP '+r.status);
        btn.classList.add('ok');btn.textContent='Done';
        setTimeout(()=>ihRefresh(),800);
      }catch{btn.classList.add('fail');btn.textContent='Error';}
      finally{setTimeout(()=>{btn.disabled=false;btn.classList.remove('ok','fail');btn.innerHTML=orig;},2000);}
    }

    async function toggleSeries(name,status,btn){
      btn.disabled=true;const orig=btn.textContent;btn.textContent='...';
      try{
        await fetch(`${WORKER}/claude/action`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:status==='complete'?'mark-complete':'mark-active',series:name})});
        setTimeout(()=>ihRefresh(),300);
      }catch{btn.disabled=false;btn.textContent=orig;}
    }

    // ── Renderers ─────────────────────────────────────────────────────────────
    function renderSeries(stats){
      if(!stats||!Object.keys(stats).length){htm('series-list','<div class="ih-empty">No data</div>');return;}
      const entries=Object.entries(stats);
      set('series-summary',`${entries.filter(([,d])=>d.status==='complete').length}/${entries.length} complete`);
      entries.sort(([,a],[,b])=>a.status===b.status?0:a.status==='active'?-1:1);
      htm('series-list',entries.map(([name,d])=>{
        const isC=d.status==='complete';
        const label=esc(name.replace(/-/g,' '));
        const gapHtml=d.episode_gaps?.length?`<span class="ih-series-gap">⚠ gap ${esc(d.episode_gaps.join(','))}</span>`:''';
        const statsHtml=`<span>${esc(d.episodes)} ep</span>${d.profiles>0?`<span>${esc(d.profiles)} pr</span>`:''}`+(isC?`<span class="ih-series-done">✓ done</span>`:gapHtml||`<span class="ih-series-next">next #${esc(d.next_episode)}</span>`);
        const btnHtml=isC?`<button class="ih-series-btn" data-series-name="${esc(name)}" data-series-action="active">↺ Mark Active</button>`:`<button class="ih-series-btn" data-series-name="${esc(name)}" data-series-action="complete">✓ Mark Complete</button>`;
        return`<div class="ih-series-card${isC?' complete':''}"><div class="ih-series-card-top"><span class="ih-series-name">${label}</span><span class="ih-badge ${isC?'complete':'active'}">${isC?'✓ COMPLETE':'ACTIVE'}</span></div><div class="ih-series-stats">${statsHtml}</div><div class="ih-series-actions">${btnHtml}</div></div>`;
      }).join(''));
    }

    function renderCronLog(log){
      if(!log?.length){htm('cron-list','<div class="ih-empty">No runs yet</div>');return;}
      htm('cron-list',log.map(r=>{
        const pub=`<span class="ih-cron-${r.published>0?'pub':'idle'}">${r.published>0?'++':'·'}${esc(r.published)}</span>`;
        const del=`<span class="ih-cron-${r.deleted>0?'del':'idle'}">${r.deleted>0?'-':'·'}${esc(r.deleted)}</span>`;
        const fail=r.failed>0?`<span class="ih-cron-fail">✕${esc(r.failed)}</span>`:''';
        const files=r.details?.filter(d=>d.success).map(d=>fname(d.path)).join(', ')||''';
        return`<div class="ih-cron-row"><span class="ih-cron-time">${esc(rel(r.ran_at))}</span>${pub} ${del}${fail}${files?`<span class="ih-cron-files">${files}</span>`:''}</div>`;
      }).join(''));
    }

    function renderActivity(activity){
      if(!activity?.length){htm('activity-list','<div class="ih-empty">No activity yet</div>');return;}
      const icons={publish:'↑',delete:'✕',rollback:'↩'},colors={publish:'#22c55e',delete:'#ef4444',rollback:'#f59e0b'};
      htm('activity-list',activity.map(r=>`<div class="ih-act-row"><span class="ih-act-icon" style="color:${colors[r.action]||'#64748b'}">${icons[r.action]||'·'}</span><span class="ih-act-path">${fname(r.path)}</span><span class="ih-act-time">${esc(rel(r.happened_at))}</span></div>`).join(''));
    }

    function renderStaged(staged){
      if(!staged?.length){hide('section-staged');return;}
      showB('section-staged');set('staged-count-label',staged.length+' files');
      htm('staged-list',staged.map(d=>`<div class="ih-staged-row"><span class="ih-staged-path">${fname(d.path)}</span><span class="ih-staged-size">${esc((d.size/1024).toFixed(1))}kb</span></div>`).join(''));
    }

    // ── Two-phase refresh: fast health first, then full heartbeat ─────────────
    async function ihRefresh(){
      clearTimeout(pollTimer);
      show('s-spin','<span class="ih-spin"></span>');

      try{
        // Phase 1: fast — no file scan, responds in ~300ms
        const r=await fetch(`${WORKER}/claude/health`);
        if(!r.ok)throw new Error('HTTP '+r.status);
        const h=await r.json();

        // Strip updates immediately
        hide('s-spin');
        failCount=0;
        $('ih-strip').classList.remove('offline');
        set('s-time','just now');
        const ok=h.status==='ok'||h.status==='warning';
        const md=$('s-main');md.style.display='inline-block';
        md.className='ih-dot '+(ok?h.status==='warning'?'yellow':'green':'red');
        dot('p-worker-dot',ok?'green':'red');set('p-worker-val',ok?'Online':'Offline');
        dot('p-github-dot',h.github_user?'green':'red');set('p-github-val',h.github_user||'—');
        dot('p-d1-dot',h.d1==='connected'?'green':'red');set('p-d1-val',h.d1||'—');
        const td=h.drafts||0,tq=h.queue||0;
        dot('p-queue-dot',td>0?'blue':'gray');set('p-queue-val',td>0?`${td} draft${td!==1?'s':''}, ${tq} queued`:'Empty');
        $('btn-staged-count').textContent=td;
        if(h.last_cron){dot('p-cron-dot','green');set('p-cron-val',rel(h.last_cron.ran_at));}
        else{dot('p-cron-dot','gray');set('p-cron-val','Never run');}
        const dn=h.dead_letter||0;
        dot('p-dead-dot',dn>0?'red':'gray');set('p-dead-val',dn>0?`${dn} failed`:'None');
        dn>0?show('s-dead',`<span style="color:#fca5a5;background:#3b0a0a;padding:0 5px;border-radius:3px;font-size:9px">⚠ ${esc(dn)} failed</span>`):hide('s-dead');
        td>0?show('s-staged',`<span style="color:#7dd3fc;background:#0f2a4a;padding:0 5px;border-radius:3px;font-size:9px">${esc(td)} staged</span>`):hide('s-staged');

        // Phase 2: full heartbeat — runs async, fills in series/cron/activity
        fetch(`${WORKER}/claude/heartbeat`).then(async r2=>{
          if(!r2.ok)return;
          const data=await r2.json();
          const{connections,stats,cron_log,staged,activity}=data;
          const cm={};(connections||[]).forEach(c=>cm[c.name]=c);
          const cs=connSt(cm['claude']);dot('p-claude-dot',cs.color);set('p-claude-val',cs.text);
          const gaps=[];
          if(stats)Object.entries(stats).forEach(([s,d])=>{if(d.episode_gaps?.length)gaps.push(s+':'+d.episode_gaps.join(','));});
          if(gaps.length){dot('p-gaps-dot','yellow');set('p-gaps-val',gaps.join(' · '));show('s-gaps','<span style="color:#f59e0b;font-size:9px">⚠ gap</span>');}
          else{dot('p-gaps-dot','green');set('p-gaps-val','None');hide('s-gaps');}
          renderStaged(staged);renderSeries(stats);renderCronLog(cron_log);renderActivity(activity);
          set('s-time','just now');
        }).catch(e=>console.warn('[ih] heartbeat failed:',e.message));

      }catch(e){
        console.error('[ih] health failed:',e.message);
        failCount++;hide('s-spin');
        $('ih-strip').classList.add('offline');
        const md=$('s-main');md.style.display='inline-block';md.className='ih-dot red pulse';
        dot('p-worker-dot','red');set('p-worker-val','Unreachable');set('s-time','failed');
        if(failCount>1)show('s-retry',`<span style="color:#f97316;font-size:9px;background:#1c0a00;padding:0 5px;border-radius:3px">retry ${esc(failCount)}</span>`);
      }finally{
        pollTimer=setTimeout(ihRefresh,Math.min(BASE_MS*Math.pow(1.5,failCount),MAX_MS));
      }
    }

    // Pause when tab hidden, resume when visible
    document.addEventListener('visibilitychange',()=>{
      if(document.hidden)clearTimeout(pollTimer);
      else ihRefresh();
    });

    // Start after 2s
    setTimeout(ihRefresh, 2000);
  </script>
</body>
</html>
