<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>ishistory CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #040810;
      --surface: #080f1c;
      --card:    #0c1624;
      --border:  #152035;
      --border2: #1a2a42;
      --amber:   #b45309;
      --amber2:  #d97706;
      --amber3:  #f59e0b;
      --green:   #22c55e;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --yellow:  #eab308;
      --purple:  #a78bfa;
      --text:    #94a3b8;
      --text2:   #cbd5e1;
      --text3:   #e2e8f0;
      --dim:     #334155;
      --mono:    'JetBrains Mono', ui-monospace, monospace;
      --sans:    'DM Sans', system-ui, sans-serif;
      --serif:   'Playfair Display', Georgia, serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); }

    /* FAB */
    #d-fab {
      position: fixed; right: 10px; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border2);
      cursor: pointer; z-index: 99990; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 24px #00000088; transition: all .2s; user-select: none;
    }
    #d-fab:hover { border-color: var(--amber); background: var(--card); }
    #d-fab-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); transition: background .4s, box-shadow .4s; }
    #d-fab-dot.green  { background: var(--green);  box-shadow: 0 0 8px #22c55e66; }
    #d-fab-dot.amber  { background: var(--amber2); box-shadow: 0 0 8px #d9770666; }
    #d-fab-dot.red    { background: var(--red);    box-shadow: 0 0 8px #ef444466; }

    /* Overlay */
    #d-overlay { position: fixed; inset: 0; background: #00000099; z-index: 99991; opacity: 0; pointer-events: none; transition: opacity .25s; }
    #d-overlay.open { opacity: 1; pointer-events: all; }

    /* Panel */
    #d-panel { position: fixed; inset: 0; z-index: 99992; display: flex; flex-direction: column; transform: translateY(100%); transition: transform .35s cubic-bezier(.4,0,.2,1); background: var(--bg); }
    #d-panel.open { transform: translateY(0); }

    /* Header */
    #d-header { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    #d-title { font-family: var(--serif); font-size: 18px; color: var(--text3); }
    #d-title span { color: var(--amber2); }
    #d-user { font-family: var(--mono); font-size: 10px; color: var(--dim); padding: 3px 8px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; }
    #d-updated { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-left: auto; }
    .hdr-btn { font-family: var(--mono); font-size: 10px; color: var(--dim); background: none; border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; cursor: pointer; transition: all .15s; }
    .hdr-btn:hover { color: var(--red); border-color: var(--red); }
    .hdr-btn.close-btn:hover { color: var(--text2); border-color: var(--border2); }

    /* Tabs */
    #d-tabs { display: flex; gap: 2px; padding: 10px 20px 0; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
    #d-tabs::-webkit-scrollbar { display: none; }
    .d-tab { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); background: none; border: none; cursor: pointer; padding: 8px 14px; border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s; }
    .d-tab:hover { color: var(--text2); }
    .d-tab.active { color: var(--amber2); border-bottom-color: var(--amber2); }

    /* Body */
    #d-body { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .d-view { display: none; }
    .d-view.active { display: block; }

    /* Login */
    #d-login { position: fixed; inset: 0; z-index: 99993; background: var(--bg); display: none; align-items: center; justify-content: center; }
    #d-login.show { display: flex; }
    .login-box { width: 360px; padding: 40px; background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; }
    .login-logo { font-family: var(--serif); font-size: 28px; color: var(--amber2); margin-bottom: 4px; }
    .login-sub  { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-bottom: 28px; text-transform: uppercase; letter-spacing: .1em; }
    .login-note { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 16px; line-height: 1.7; }
    .login-note a { color: var(--amber2); text-decoration: none; }

    /* Cards */
    .d-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .d-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; position: relative; overflow: hidden; }
    .d-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--amber) 0%, transparent 100%); }
    .d-card-title { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .12em; color: var(--dim); margin-bottom: 12px; }
    .d-card-val { font-family: var(--serif); font-size: 28px; color: var(--text3); line-height: 1; }
    .d-card-sub { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 4px; }

    /* Section titles */
    .d-sec { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--dim); margin: 20px 0 10px; display: flex; align-items: center; gap: 8px; }
    .d-sec::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Buttons */
    .d-btn { font-family: var(--mono); font-size: 11px; background: var(--surface); color: var(--dim); border: 1px solid var(--border2); padding: 7px 14px; border-radius: 6px; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .d-btn:hover:not(:disabled) { background: var(--card); color: var(--text2); border-color: var(--dim); }
    .d-btn:disabled { opacity: .35; cursor: not-allowed; }
    .d-btn.pri { background: var(--amber); color: #fff; border-color: var(--amber); }
    .d-btn.pri:hover:not(:disabled) { background: var(--amber2); }
    .d-btn.dan:hover:not(:disabled) { background: #450a0a; color: var(--red); border-color: var(--red); }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }

    /* Form */
    .d-form { background: var(--card); border: 1px solid var(--border2); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .d-form-title { font-family: var(--serif); font-size: 15px; color: var(--text3); margin-bottom: 14px; }
    .d-field { margin-bottom: 12px; }
    .d-lbl { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); display: block; margin-bottom: 5px; }
    .d-inp, .d-sel { width: 100%; background: var(--surface); border: 1px solid var(--border2); color: var(--text2); padding: 9px 12px; border-radius: 6px; font-family: var(--mono); font-size: 12px; outline: none; transition: border-color .15s; }
    .d-inp:focus, .d-sel:focus { border-color: var(--amber); }
    .d-sel option { background: var(--surface); }

    /* Run cards */
    .run-list { display: flex; flex-direction: column; gap: 8px; }
    .run { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
    .run-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
    .run-file { font-family: var(--mono); font-size: 11px; color: var(--amber3); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .run-time { font-family: var(--mono); font-size: 10px; color: var(--dim); flex-shrink: 0; }
    .run-commit { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-bottom: 8px; }
    .run-plats { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
    .plat { font-family: var(--mono); font-size: 10px; padding: 3px 9px; border-radius: 4px; display: flex; align-items: center; gap: 4px; cursor: default; }
    .plat.ok   { background: #052e1622; color: var(--green);  border: 1px solid #052e16; }
    .plat.fail { background: #450a0a22; color: var(--red);    border: 1px solid #450a0a; cursor: pointer; }
    .plat.skip { background: var(--surface); color: var(--dim); border: 1px solid var(--border); }
    .run-err { font-family: var(--mono); font-size: 10px; color: var(--red); margin-top: 6px; padding: 6px 10px; background: #450a0a22; border-radius: 4px; word-break: break-all; line-height: 1.5; }

    /* AI badge */
    .ai-badge { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .06em; padding: 3px 9px; border-radius: 4px; margin-top: 8px; }
    .ai-badge.generated { background: #1c1040; color: var(--purple); border: 1px solid #3b1fa0; }
    .ai-badge.cached    { background: #052e16; color: var(--green);  border: 1px solid #145228; }

    /* Series */
    .series-list { display: flex; flex-direction: column; gap: 10px; }
    .series { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .series-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .series-name { font-family: var(--serif); font-size: 16px; color: var(--text3); text-transform: capitalize; }
    .series-badge { font-family: var(--mono); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; }
    .series-badge.active   { background: #0c1e3a; color: var(--blue);  border: 1px solid #1d3a6a; }
    .series-badge.complete { background: #052010; color: var(--green); border: 1px solid #145228; }
    .d-prog { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
    .d-prog-fill { height: 100%; border-radius: 2px; transition: width .6s ease; background: linear-gradient(90deg, var(--blue), var(--amber2)); }
    .series-stats { font-family: var(--mono); font-size: 11px; color: var(--dim); display: flex; gap: 16px; flex-wrap: wrap; }
    .series-stats .next { color: var(--green); }
    .series-stats .gap  { color: var(--yellow); }

    /* Action runs */
    .act-list { display: flex; flex-direction: column; gap: 6px; }
    .act-run { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; text-decoration: none; transition: border-color .15s; }
    .act-run:hover { border-color: var(--border2); }
    .act-name { font-family: var(--sans); font-size: 12px; color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .act-branch { font-family: var(--mono); font-size: 10px; color: var(--dim); }
    .act-time { font-family: var(--mono); font-size: 10px; color: var(--dim); flex-shrink: 0; }
    .act-status { font-family: var(--mono); font-size: 9px; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; flex-shrink: 0; }
    .act-status.success     { background: #052e16; color: var(--green); }
    .act-status.failure     { background: #450a0a; color: var(--red); }
    .act-status.in_progress { background: #1c2a0a; color: var(--yellow); }
    .act-status.queued      { background: var(--card); color: var(--dim); }

    /* Schedule */
    .sched-list { display: flex; flex-direction: column; gap: 8px; }
    .sched-item { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
    .sched-info { flex: 1; min-width: 0; }
    .sched-label { font-family: var(--sans); font-size: 13px; color: var(--text2); margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sched-meta  { font-family: var(--mono); font-size: 10px; color: var(--dim); }
    .sched-date  { font-family: var(--mono); font-size: 11px; color: var(--amber2); flex-shrink: 0; }

    /* Toast */
    #d-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--card); border: 1px solid var(--border2); color: var(--text2); font-family: var(--mono); font-size: 11px; padding: 10px 20px; border-radius: 8px; z-index: 99999; transition: transform .3s; pointer-events: none; white-space: nowrap; }
    #d-toast.show { transform: translateX(-50%) translateY(0); }
    #d-toast.ok   { border-color: var(--green); color: var(--green); }
    #d-toast.err  { border-color: var(--red);   color: var(--red);   }

    /* Misc */
    .d-empty { font-family: var(--mono); font-size: 11px; color: var(--dim); padding: 20px; text-align: center; }
    .spin { display: inline-block; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border2); border-top-color: var(--amber2); animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>

<!-- Load Sveltia CMS normally -->
<script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js" type="module" data-cfasync="false"></script>

<!-- Login screen -->
<div id="d-login">
  <div class="login-box">
    <div class="login-logo">ishistory</div>
    <div class="login-sub">Command Centre</div>
    <button class="d-btn pri" style="width:100%;padding:13px;font-size:13px;margin-bottom:12px" onclick="doOAuth()">
      Sign in with GitHub
    </button>
    <div id="login-status" style="font-family:var(--mono);font-size:10px;color:var(--dim);text-align:center;min-height:16px"></div>
    <div class="login-note">
      Uses the same OAuth flow as the CMS.<br>
      One login covers both — no token to remember.
    </div>
  </div>
</div>

<!-- FAB -->
<div id="d-fab" onclick="dToggle()"><div id="d-fab-dot"></div></div>

<!-- Overlay -->
<div id="d-overlay" onclick="dClose()"></div>

<!-- Panel -->
<div id="d-panel">
  <div id="d-header">
    <div id="d-title">is<span>history</span></div>
    <div id="d-user" style="display:none"></div>
    <div id="d-updated" style="margin-left:auto"></div>
    <button class="hdr-btn" onclick="doLogout()">Logout</button>
    <button class="hdr-btn close-btn" onclick="dClose()">✕</button>
  </div>
  <div id="d-tabs">
    <button class="d-tab active" onclick="dTab('overview',this)">Overview</button>
    <button class="d-tab" onclick="dTab('pipeline',this)">Pipeline</button>
    <button class="d-tab" onclick="dTab('series',this)">Series</button>
    <button class="d-tab" onclick="dTab('schedule',this)">Schedule</button>
    <button class="d-tab" onclick="dTab('actions',this)">Actions</button>
  </div>
  <div id="d-body">

    <div id="view-overview" class="d-view active">
      <div class="d-grid" id="ov-stats"></div>
      <div class="d-sec">Last Pipeline Run</div>
      <div id="ov-run"><div class="d-empty"><span class="spin"></span></div></div>
      <div class="d-sec">Recent Commits</div>
      <div id="ov-commits"><div class="d-empty"><span class="spin"></span></div></div>
    </div>

    <div id="view-pipeline" class="d-view">
      <div class="btn-row">
        <button class="d-btn pri" onclick="toggleTrigger()">▶ Run Pipeline</button>
        <button class="d-btn" onclick="loadPipeline()">↺ Refresh</button>
      </div>
      <div class="d-form" id="trigger-form" style="display:none">
        <div class="d-form-title">Trigger Pipeline Manually</div>
        <div class="d-field">
          <label class="d-lbl">File path</label>
          <input class="d-inp" id="trigger-file" placeholder="src/content/ai-history/episode-01.md" />
        </div>
        <div class="btn-row">
          <button class="d-btn pri" onclick="doTrigger()">Trigger</button>
          <button class="d-btn" onclick="document.getElementById('trigger-form').style.display='none'">Cancel</button>
        </div>
      </div>
      <div class="d-sec">Run History</div>
      <div id="pipe-runs"><div class="d-empty"><span class="spin"></span></div></div>
    </div>

    <div id="view-series" class="d-view">
      <div id="series-wrap"><div class="d-empty"><span class="spin"></span></div></div>
    </div>

    <div id="view-schedule" class="d-view">
      <div class="d-form">
        <div class="d-form-title">Schedule a Post</div>
        <div class="d-field"><label class="d-lbl">File</label><select class="d-sel" id="sched-file"><option>Loading…</option></select></div>
        <div class="d-field"><label class="d-lbl">Publish Date &amp; Time (UTC)</label><input class="d-inp" type="datetime-local" id="sched-dt" /></div>
        <div class="d-field"><label class="d-lbl">Label (optional)</label><input class="d-inp" type="text" id="sched-lbl" placeholder="AI History Episode 26" /></div>
        <button class="d-btn pri" onclick="addSchedule()">Schedule Post</button>
      </div>
      <div class="d-sec">Scheduled Posts</div>
      <div id="sched-list"><div class="d-empty"><span class="spin"></span></div></div>
    </div>

    <div id="view-actions" class="d-view">
      <div class="btn-row"><button class="d-btn" onclick="loadActions()">↺ Refresh</button></div>
      <div class="d-sec">Workflow Runs</div>
      <div id="act-list"><div class="d-empty"><span class="spin"></span></div></div>
    </div>

  </div>
</div>

<div id="d-toast"></div>

<script>
  const REPO    = 'ishaan-00/ishistory';
  const GH_API  = 'https://api.github.com';
  const TOK_KEY = 'ih-gh-token';

  let TOKEN = null, isOpen = false, activeTab = 'overview', treeCache = null;

  // ── Auth & SSO ────────────────────────────────────────────────────────────
  const AUTH_WORKER = 'https://sveltia-cms-auth.aadityadarpan5.workers.dev';
  const SITE_ID     = location.host || 'ishistory.pages.dev';

  // 1. Fetch token from Sveltia CMS IndexedDB quietly
  async function getSveltiaToken() {
    return new Promise((resolve) => {
      // Sveltia CMS uses localforage which defaults to 'sveltia-cms' DB
      const dbName = 'sveltia-cms'; 
      const storeName = 'keyvaluepairs';
      const keyName = 'sveltia-cms.user';

      const req = indexedDB.open(dbName);
      
      req.onerror = () => resolve(null);
      req.onsuccess = (event) => {
        const db = event.target.result;
        
        // Safely check if the store exists
        if (!db.objectStoreNames.contains(storeName)) {
          return resolve(null);
        }
        
        try {
          const tx = db.transaction(storeName, 'readonly');
          const store = tx.objectStore(storeName);
          const userReq = store.get(keyName);
          
          userReq.onsuccess = () => {
            const user = userReq.result;
            if (user && user.token) {
              resolve(user.token);
            } else {
              resolve(null);
            }
          };
          userReq.onerror = () => resolve(null);
        } catch (e) {
          resolve(null);
        }
      };
    });
  }

  /// 2. Manual Login flow fallback
  function doOAuth() {
    const status = document.getElementById('login-status');
    status.textContent = 'Opening GitHub login…';
    const w = 600, h = 700;
    const left = Math.max(0, (screen.width  - w) / 2);
    const top  = Math.max(0, (screen.height - h) / 2);
    const popup = window.open(
      AUTH_WORKER + '/auth?provider=github&site_id=' + SITE_ID,
      'gh-oauth',
      'width=' + w + ',height=' + h + ',left=' + left + ',top=' + top
    );
    if (!popup) { status.textContent = 'Popup blocked — allow popups for this page'; return; }

    const onMsg = async (e) => {
      // === THE FIX: HANDSHAKE ECHO ===
      // The worker pauses on a white screen until we echo 'authorizing:github' back to it.
      if (e.data === 'authorizing:github' || (e.data && e.data.type === 'authorizing:github')) {
        if (e.source) {
          e.source.postMessage(e.data, e.origin);
        } else if (popup) {
          popup.postMessage(e.data, e.origin);
        }
        return; // Don't proceed yet, wait for the next message with the token
      }

      let token = null;

      // === TOKEN EXTRACTION ===
      // Handle both string and JSON object payloads robustly
      if (typeof e.data === 'string' && e.data.startsWith('authorization:github:success:')) {
        try {
          const payloadStr = e.data.substring('authorization:github:success:'.length);
          const payload = JSON.parse(payloadStr);
          token = payload.token || payload.access_token;
        } catch (err) {
          console.error("Failed to parse auth string", err);
        }
      } else if (e.data && e.data.type === 'authorization:github:success' && e.data.payload) {
        token = e.data.payload.token || e.data.payload.access_token;
      }

      // Ignore unrelated messages
      if (!token) return;

      window.removeEventListener('message', onMsg);
      
      try {
        status.textContent = 'Verifying with GitHub...';
        const u = await ghRaw('/user', 'GET', null, token);
        localStorage.setItem(TOK_KEY, token);
        TOKEN = token;
        setUser(u.login);
        
        document.getElementById('d-login').classList.remove('show');
        status.textContent = '';
        if (!popup.closed) popup.close();
        
        // Re-initialize UI
        dInit();
      } catch(e2) {
        status.textContent = 'Auth failed: ' + e2.message;
      }
    };
    window.addEventListener('message', onMsg);

    // Clean up if popup closed manually
    const checkClosed = setInterval(() => {
      if (popup.closed) {
        clearInterval(checkClosed);
        window.removeEventListener('message', onMsg);
        const s = document.getElementById('login-status');
        if (s && s.textContent === 'Opening GitHub login…') s.textContent = '';
      }
    }, 500);
  }

  function doLogout() {
    localStorage.removeItem(TOK_KEY);
    TOKEN = null;
    document.getElementById('d-user').style.display = 'none';
    document.getElementById('d-login').classList.add('show');
    dClose();
  }

  function setUser(login) {
    const el = document.getElementById('d-user');
    el.textContent = '@' + login;
    el.style.display = 'block';
  }

  // ── GitHub API ────────────────────────────────────────────────────────────
  async function ghRaw(endpoint, method, body, tok) {
    const res = await fetch(GH_API + endpoint, {
      method: method || 'GET',
      headers: { Authorization: 'Bearer ' + (tok || TOKEN), Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : null,
    });
    if (res.status === 401) { doLogout(); throw new Error('Token expired — please log in again'); }
    if (res.status === 204) return null;
    const d = await res.json();
    if (!res.ok) throw new Error(d.message || 'HTTP ' + res.status);
    return d;
  }
  const gh = (ep, m, b) => ghRaw(ep, m, b, TOKEN);

  async function ghFile(fp) {
    const d = await gh('/repos/' + REPO + '/contents/' + fp);
    if (!d || d.message) return null;
    return { content: atob(d.content.replace(/\n/g,'')), sha: d.sha };
  }

  async function ghWrite(fp, content, msg, sha) {
    return gh('/repos/' + REPO + '/contents/' + fp, 'PUT', {
      message: msg,
      content: btoa(unescape(encodeURIComponent(content))),
      ...(sha ? { sha } : {})
    });
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function relTime(s) {
    if (!s) return '—';
    const d = Math.floor((Date.now() - new Date(s)) / 1000);
    if (isNaN(d)) return '—';
    if (d < 5) return 'just now';
    if (d < 60) return d + 's ago';
    if (d < 3600) return Math.floor(d/60) + 'm ago';
    if (d < 86400) return Math.floor(d/3600) + 'h ago';
    return Math.floor(d/86400) + 'd ago';
  }

  function fmtDate(s) {
    if (!s) return '—';
    return new Date(s).toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', timeZone:'UTC', timeZoneName:'short' });
  }

  function fn(p) { return p ? p.split('/').pop() : p; }

  let toastT;
  function toast(msg, type) {
    const el = document.getElementById('d-toast');
    el.textContent = msg; el.className = (type || '') + ' show';
    clearTimeout(toastT); toastT = setTimeout(() => el.className = '', 3000);
  }

  function buildPlatRow(run) {
    return ['discord','devto','hashnode','ntfy','indexnow'].map(p => {
      const r = run[p] || {};
      if (r.skipped) return '<span class="plat skip">⊘ ' + p + '</span>';
      if (r.ok)      return '<span class="plat ok">✓ ' + p + '</span>';
      const e = (r.err || '').replace(/"/g,'&quot;').slice(0,200);
      return '<span class="plat fail" title="' + e + '">✗ ' + p + '</span>';
    }).join('');
  }

  function buildAIBadge(run) {
    if (run.ai_cached)    return '<span class="ai-badge cached">⚡ AI content cached</span>';
    if (run.ai_generated) return '<span class="ai-badge generated">✦ AI generated (Mistral)</span>';
    return '';
  }

  function buildRunHTML(r) {
    const errs = ['discord','devto','hashnode','ntfy','indexnow']
      .filter(p => r[p] && !r[p].ok && !r[p].skipped && r[p].err)
      .map(p => '<div class="run-err"><strong>' + p + ':</strong> ' + (r[p].err||'').slice(0,300) + '</div>')
      .join('');
    return '<div class="run">' +
      '<div class="run-top"><div class="run-file">' + r.file + '</div><div class="run-time">' + relTime(r.ran_at) + '</div></div>' +
      '<div class="run-commit">commit <span style="color:var(--amber3)">' + r.commit + '</span> · ' + fmtDate(r.ran_at) + '</div>' +
      '<div class="run-plats">' + buildPlatRow(r) + '</div>' +
      buildAIBadge(r) +
      errs +
      '</div>';
  }

  // ── Panel ─────────────────────────────────────────────────────────────────
  function dToggle() { isOpen ? dClose() : dOpen(); }
  function dOpen() {
    if (!TOKEN) { document.getElementById('d-login').classList.add('show'); return; }
    isOpen = true;
    document.getElementById('d-panel').classList.add('open');
    document.getElementById('d-overlay').classList.add('open');
    dRefresh();
  }
  function dClose() {
    isOpen = false;
    document.getElementById('d-panel').classList.remove('open');
    document.getElementById('d-overlay').classList.remove('open');
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && isOpen) dClose(); });

  function dTab(name, btn) {
    activeTab = name;
    document.querySelectorAll('.d-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.d-view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    ({ overview: loadOverview, pipeline: loadPipeline, series: loadSeries, schedule: loadSchedule, actions: loadActions })[name]?.();
  }

  function dRefresh() {
    treeCache = null;
    ({ overview: loadOverview, pipeline: loadPipeline, series: loadSeries, schedule: loadSchedule, actions: loadActions })[activeTab]?.();
  }

  // ── File tree ─────────────────────────────────────────────────────────────
  async function getTree() {
    if (treeCache) return treeCache;
    const d = await gh('/repos/' + REPO + '/git/trees/main?recursive=1');
    treeCache = (d?.tree || []).filter(f => f.type === 'blob');
    return treeCache;
  }

  async function getStatus() {
    const f = await ghFile('src/data/status.json').catch(() => null);
    if (!f) return { runs: [] };
    try { return JSON.parse(f.content); } catch(_) { return { runs: [] }; }
  }

  // ── Overview ──────────────────────────────────────────────────────────────
  async function loadOverview() {
    const [status, tree, commits] = await Promise.all([
      getStatus(),
      getTree(),
      gh('/repos/' + REPO + '/commits?per_page=5').catch(() => []),
    ]);

    const posts  = tree.filter(f => f.path.startsWith('src/content/') && f.path.endsWith('.md'));
    const series = {};
    posts.forEach(f => { const s = f.path.split('/')[2]; if (s) series[s] = (series[s]||0)+1; });

    const last  = status.runs?.[0];
    const plats = last ? ['discord','devto','hashnode','ntfy','indexnow'].map(p=>last[p]).filter(r=>!r?.skipped) : [];
    const allOk = plats.length > 0 && plats.every(r=>r?.ok);
    const anyFail = plats.some(r=>!r?.ok);

    document.getElementById('d-fab-dot').className = allOk ? 'green' : anyFail ? 'red' : 'amber';

    document.getElementById('ov-stats').innerHTML =
      '<div class="d-card"><div class="d-card-title">Total Posts</div><div class="d-card-val">' + posts.length + '</div><div class="d-card-sub">' + Object.keys(series).length + ' series</div></div>' +
      '<div class="d-card"><div class="d-card-title">Last Pipeline</div><div class="d-card-val" style="font-size:18px;font-family:var(--mono)">' + (last ? relTime(last.ran_at) : '—') + '</div><div class="d-card-sub" style="color:' + (allOk?'var(--green)':anyFail?'var(--red)':'var(--dim)') + '">' + (allOk?'All platforms OK':anyFail?'Some failures':'No runs yet') + '</div></div>' +
      '<div class="d-card"><div class="d-card-title">Scheduled</div><div class="d-card-val" id="ov-sched">—</div><div class="d-card-sub">pending posts</div></div>';

    ghFile('src/data/scheduled.json').then(f => {
      try { const el = document.getElementById('ov-sched'); if (el) el.textContent = f ? JSON.parse(f.content).length : 0; } catch(_){}
    }).catch(()=>{});

    document.getElementById('ov-run').innerHTML = last ? buildRunHTML(last) : '<div class="d-empty">No pipeline runs yet</div>';

    document.getElementById('ov-commits').innerHTML = commits?.length
      ? '<div class="act-list">' + (commits||[]).map(c =>
          '<a class="act-run" href="' + c.html_url + '" target="_blank" rel="noopener">' +
          '<div class="act-name">' + c.commit.message.split('\n')[0] + '</div>' +
          '<div class="act-time">' + relTime(c.commit.author.date) + '</div>' +
          '<div class="act-branch" style="font-size:9px">' + c.sha.slice(0,7) + '</div></a>').join('') + '</div>'
      : '<div class="d-empty">No commits</div>';

    document.getElementById('d-updated').textContent = 'updated ' + relTime(new Date().toISOString());
  }

  // ── Pipeline ──────────────────────────────────────────────────────────────
  async function loadPipeline() {
    document.getElementById('pipe-runs').innerHTML = '<div class="d-empty"><span class="spin"></span></div>';
    const s = await getStatus().catch(() => ({ runs: [] }));
    document.getElementById('pipe-runs').innerHTML = s.runs?.length
      ? '<div class="run-list">' + s.runs.map(buildRunHTML).join('') + '</div>'
      : '<div class="d-empty">No pipeline runs recorded yet</div>';
  }

  function toggleTrigger() {
    const f = document.getElementById('trigger-form');
    f.style.display = f.style.display === 'none' ? 'block' : 'none';
  }

  async function doTrigger() {
    const file = document.getElementById('trigger-file').value.trim();
    if (!file) { toast('Enter a file path', 'err'); return; }
    try {
      await gh('/repos/' + REPO + '/actions/workflows/on-publish.yml/dispatches', 'POST', { ref: 'main', inputs: { file } });
      toast('Pipeline triggered ✓', 'ok');
      document.getElementById('trigger-form').style.display = 'none';
      setTimeout(loadActions, 2000);
    } catch(e) { toast('Failed: ' + e.message, 'err'); }
  }

  // ── Series ────────────────────────────────────────────────────────────────
  async function loadSeries() {
    document.getElementById('series-wrap').innerHTML = '<div class="d-empty"><span class="spin"></span></div>';
    const tree  = await getTree();
    const posts = tree.filter(f => f.path.startsWith('src/content/') && f.path.endsWith('.md'));
    const ser   = {};
    posts.forEach(f => {
      const [,,s,fn] = f.path.split('/');
      if (!s||!fn) return;
      if (!ser[s]) ser[s] = { ep:[], pr:[] };
      const n = fn.match(/\d+/); const num = n ? +n[0] : null;
      if (fn.startsWith('profile')) ser[s].pr.push(num); else ser[s].ep.push(num);
    });
    if (!Object.keys(ser).length) { document.getElementById('series-wrap').innerHTML = '<div class="d-empty">No series</div>'; return; }
    const cards = Object.entries(ser).map(([name,d]) => {
      const eps  = d.ep.filter(Boolean).sort((a,b)=>a-b);
      const pros = d.pr.filter(Boolean).sort((a,b)=>a-b);
      const gaps = []; for (let i=1;i<eps.length;i++) for (let g=eps[i-1]+1;g<eps[i];g++) gaps.push(g);
      const next = eps.length ? Math.max(...eps)+1 : 1;
      const pct  = Math.min(100, Math.round((eps.length%10||(eps.length>0?10:0))/10*100));
      return '<div class="series"><div class="series-top"><div class="series-name">' + name.replace(/-/g,' ') + '</div><span class="series-badge active">active</span></div>' +
        '<div class="d-prog"><div class="d-prog-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="series-stats"><span>' + eps.length + ' ep</span>' +
        (pros.length ? '<span>' + pros.length + ' profiles</span>' : '') +
        '<span class="next">next: #' + next + '</span>' +
        (gaps.length ? '<span class="gap">gaps: ' + gaps.join(', ') + '</span>' : '') +
        '</div></div>';
    });
    document.getElementById('series-wrap').innerHTML = '<div class="series-list">' + cards.join('') + '</div>';
  }

  // ── Schedule ──────────────────────────────────────────────────────────────
  async function loadSchedule() {
    const tree  = await getTree();
    const files = tree.filter(f => f.path.startsWith('src/content/') && f.path.endsWith('.md')).map(f=>f.path).sort();
    const sel   = document.getElementById('sched-file');
    sel.innerHTML = '<option value="">Select a post…</option>' + files.map(f => '<option value="' + f + '">' + f.split('/').slice(2).join('/') + '</option>').join('');
    await renderSched();
  }

  async function renderSched() {
    document.getElementById('sched-list').innerHTML = '<div class="d-empty"><span class="spin"></span></div>';
    const f = await ghFile('src/data/scheduled.json').catch(() => null);
    let items = []; try { if (f) items = JSON.parse(f.content); } catch(_){}
    if (!items.length) { document.getElementById('sched-list').innerHTML = '<div class="d-empty">No scheduled posts</div>'; return; }
    items.sort((a,b) => new Date(a.publish_at) - new Date(b.publish_at));
    document.getElementById('sched-list').innerHTML = '<div class="sched-list">' + items.map(i =>
      '<div class="sched-item"><div class="sched-info"><div class="sched-label">' + (i.label||fn(i.file)) + '</div><div class="sched-meta">' + i.file + '</div></div>' +
      '<div class="sched-date">' + fmtDate(i.publish_at) + '</div>' +
      '<button class="d-btn dan" style="padding:5px 10px;font-size:10px" onclick="removeSchedule(\'' + i.id + '\')">✕</button></div>'
    ).join('') + '</div>';
  }

  async function addSchedule() {
    const file = document.getElementById('sched-file').value;
    const dt   = document.getElementById('sched-dt').value;
    const lbl  = document.getElementById('sched-lbl').value.trim();
    if (!file) { toast('Select a file', 'err'); return; }
    if (!dt)   { toast('Pick a date', 'err');   return; }
    const f = await ghFile('src/data/scheduled.json').catch(() => null);
    let items = []; try { if (f) items = JSON.parse(f.content); } catch(_){}
    items.push({ id: 'sched-' + Date.now(), file, publish_at: new Date(dt + ':00Z').toISOString(), label: lbl||fn(file), added_at: new Date().toISOString() });
    await ghWrite('src/data/scheduled.json', JSON.stringify(items, null, 2), 'chore: schedule ' + fn(file) + ' [skip ci]', f?.sha);
    toast('Scheduled ✓', 'ok');
    document.getElementById('sched-lbl').value = '';
    document.getElementById('sched-dt').value  = '';
    document.getElementById('sched-file').value = '';
    await renderSched();
  }

  async function removeSchedule(id) {
    const f = await ghFile('src/data/scheduled.json').catch(() => null);
    if (!f) return;
    let items = []; try { items = JSON.parse(f.content); } catch(_){}
    await ghWrite('src/data/scheduled.json', JSON.stringify(items.filter(i=>i.id!==id), null, 2), 'chore: remove scheduled post [skip ci]', f.sha);
    toast('Removed ✓', 'ok');
    await renderSched();
  }

  // ── Actions ───────────────────────────────────────────────────────────────
  async function loadActions() {
    document.getElementById('act-list').innerHTML = '<div class="d-empty"><span class="spin"></span></div>';
    const d    = await gh('/repos/' + REPO + '/actions/runs?per_page=20').catch(() => null);
    const runs = d?.workflow_runs || [];
    if (!runs.length) { document.getElementById('act-list').innerHTML = '<div class="d-empty">No workflow runs</div>'; return; }
    document.getElementById('act-list').innerHTML = '<div class="act-list">' + runs.map(r => {
      const cls = r.conclusion || r.status || 'queued';
      return '<a class="act-run" href="' + r.html_url + '" target="_blank" rel="noopener">' +
        '<div class="act-name">' + r.name + ' — ' + (r.display_title || r.head_commit?.message || '').split('\n')[0].slice(0,60) + '</div>' +
        '<div class="act-branch">' + r.head_branch + '</div>' +
        '<div class="act-time">' + relTime(r.created_at) + '</div>' +
        '<span class="act-status ' + cls + '">' + cls + '</span></a>';
    }).join('') + '</div>';
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  async function dInit() {
    // 1. Check local storage
    TOKEN = localStorage.getItem(TOK_KEY);

    // 2. If no token, attempt to sync silently from Sveltia CMS IndexedDB
    if (!TOKEN) {
      const sveltiaToken = await getSveltiaToken();
      if (sveltiaToken) {
        TOKEN = sveltiaToken;
        localStorage.setItem(TOK_KEY, TOKEN);
        toast('Synced login from CMS ✓', 'ok');
      }
    }

    // 3. If STILL no token, show the login screen and exit setup
    if (!TOKEN) { 
      document.getElementById('d-login').classList.add('show'); 
      return; 
    }
    
    // 4. Verify token and set user
    try {
      const u = await gh('/user');
      setUser(u.login);
    } catch(e) {
      document.getElementById('d-login').classList.add('show');
      return;
    }

    // Pre-fetch status for FAB dot colour
    getStatus().then(s => {
      const last  = s.runs?.[0];
      if (!last) return;
      const plats = ['discord','devto','hashnode','ntfy','indexnow'].map(p=>last[p]).filter(r=>!r?.skipped);
      document.getElementById('d-fab-dot').className = plats.every(r=>r?.ok) ? 'green' : 'red';
    }).catch(()=>{});
  }

  dInit();
</script>
</body>
</html>
