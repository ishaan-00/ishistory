<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>ishistory CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #040810;
      --surface: #080f1c;
      --card:    #0c1624;
      --border:  #152035;
      --border2: #1a2a42;
      --amber:   #b45309;
      --amber2:  #d97706;
      --amber3:  #f59e0b;
      --green:   #22c55e;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --yellow:  #eab308;
      --text:    #94a3b8;
      --text2:   #cbd5e1;
      --text3:   #e2e8f0;
      --dim:     #334155;
      --dimmer:  #1e3a5f33;
      --mono:    'JetBrains Mono', ui-monospace, monospace;
      --sans:    'DM Sans', system-ui, sans-serif;
      --serif:   'Playfair Display', Georgia, serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); }

    /* ── FAB ── */
    #d-fab {
      position: fixed; right: 10px; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border2);
      cursor: pointer; z-index: 99990; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 24px #00000088; transition: all .2s; user-select: none;
      font-family: var(--mono); font-size: 11px; color: var(--dim);
    }
    #d-fab:hover { border-color: var(--amber); color: var(--amber2); background: var(--card); }
    #d-fab-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--dim);
      transition: background .4s, box-shadow .4s;
    }
    #d-fab-dot.green  { background: var(--green);  box-shadow: 0 0 8px #22c55e66; }
    #d-fab-dot.amber  { background: var(--amber2); box-shadow: 0 0 8px #d9770666; }
    #d-fab-dot.red    { background: var(--red);    box-shadow: 0 0 8px #ef444466; }
    #d-fab-dot.pulse  { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.2} }

    /* ── Overlay ── */
    #d-overlay {
      position: fixed; inset: 0; background: #00000099; z-index: 99991;
      opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    #d-overlay.open { opacity: 1; pointer-events: all; }

    /* ── Dashboard Panel ── */
    #d-panel {
      position: fixed; inset: 0; z-index: 99992;
      display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform .35s cubic-bezier(.4,0,.2,1);
      background: var(--bg);
    }
    #d-panel.open { transform: translateY(0); }

    /* ── Header ── */
    #d-header {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    #d-title { font-family: var(--serif); font-size: 18px; color: var(--text3); letter-spacing: .02em; }
    #d-title span { color: var(--amber2); }
    #d-last-updated { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-left: auto; }
    #d-close {
      background: none; border: none; color: var(--dim); cursor: pointer;
      font-size: 18px; line-height: 1; padding: 4px; transition: color .15s;
    }
    #d-close:hover { color: var(--red); }

    /* ── Tabs ── */
    #d-tabs {
      display: flex; gap: 2px; padding: 10px 20px 0;
      border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0;
      overflow-x: auto; scrollbar-width: none;
    }
    #d-tabs::-webkit-scrollbar { display: none; }
    .d-tab {
      font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
      color: var(--dim); background: none; border: none; cursor: pointer;
      padding: 8px 14px; border-bottom: 2px solid transparent; white-space: nowrap;
      transition: all .15s;
    }
    .d-tab:hover { color: var(--text2); }
    .d-tab.active { color: var(--amber2); border-bottom-color: var(--amber2); }

    /* ── Body ── */
    #d-body { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .d-view { display: none; }
    .d-view.active { display: block; }

    /* ── Cards ── */
    .d-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .d-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px; position: relative; overflow: hidden;
    }
    .d-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--amber) 0%, transparent 100%);
    }
    .d-card-title {
      font-family: var(--mono); font-size: 9px; text-transform: uppercase;
      letter-spacing: .12em; color: var(--dim); margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .d-card-val { font-family: var(--serif); font-size: 28px; color: var(--text3); line-height: 1; }
    .d-card-sub { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 4px; }

    /* ── Section headings ── */
    .d-section-title {
      font-family: var(--mono); font-size: 10px; text-transform: uppercase;
      letter-spacing: .1em; color: var(--dim); margin: 20px 0 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .d-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Status dots ── */
    .d-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .d-dot.green  { background: var(--green);  box-shadow: 0 0 5px #22c55e55; }
    .d-dot.red    { background: var(--red);    box-shadow: 0 0 5px #ef444455; }
    .d-dot.amber  { background: var(--amber2); box-shadow: 0 0 5px #d9770655; }
    .d-dot.grey   { background: var(--dim); }
    .d-dot.blue   { background: var(--blue);   box-shadow: 0 0 5px #3b82f655; }
    .d-dot.skip   { background: var(--dim); }

    /* ── Platform row ── */
    .d-platform-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
    .d-platform {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 10px; color: var(--text);
      background: var(--surface); border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 6px;
    }
    .d-platform.ok     { border-color: #052e16; color: var(--green); }
    .d-platform.fail   { border-color: #450a0a; color: var(--red); }
    .d-platform.skip   { color: var(--dim); }

    /* ── Run rows ── */
    .d-run-list { display: flex; flex-direction: column; gap: 8px; }
    .d-run {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 14px;
    }
    .d-run-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .d-run-file { font-family: var(--mono); font-size: 11px; color: var(--amber3); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .d-run-time { font-family: var(--mono); font-size: 10px; color: var(--dim); flex-shrink: 0; }
    .d-run-commit { font-family: var(--mono); font-size: 10px; color: var(--dim); }
    .d-run-err { font-family: var(--mono); font-size: 10px; color: var(--red); margin-top: 6px; padding: 4px 8px; background: #450a0a22; border-radius: 4px; word-break: break-all; }

    /* ── Series cards ── */
    .d-series-list { display: flex; flex-direction: column; gap: 10px; }
    .d-series {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px;
    }
    .d-series-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .d-series-name { font-family: var(--serif); font-size: 16px; color: var(--text3); text-transform: capitalize; }
    .d-series-badge {
      font-family: var(--mono); font-size: 9px; letter-spacing: .08em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 20px; font-weight: 500;
    }
    .d-series-badge.active   { background: #0c1e3a; color: var(--blue); border: 1px solid #1d3a6a; }
    .d-series-badge.complete { background: #052010; color: var(--green); border: 1px solid #145228; }
    .d-progress { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
    .d-progress-fill { height: 100%; border-radius: 2px; transition: width .6s ease; }
    .d-progress-fill.active   { background: linear-gradient(90deg, var(--blue), var(--amber2)); }
    .d-progress-fill.complete { background: linear-gradient(90deg, var(--green), var(--amber3)); }
    .d-series-stats { font-family: var(--mono); font-size: 11px; color: var(--dim); display: flex; gap: 16px; flex-wrap: wrap; }
    .d-series-stats .next { color: var(--green); }
    .d-series-stats .gap  { color: var(--yellow); }

    /* ── Action runs ── */
    .d-action-list { display: flex; flex-direction: column; gap: 6px; }
    .d-action-run {
      display: flex; align-items: center; gap: 10px;
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; cursor: pointer; transition: border-color .15s; text-decoration: none;
    }
    .d-action-run:hover { border-color: var(--border2); }
    .d-action-name { font-family: var(--sans); font-size: 12px; color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .d-action-branch { font-family: var(--mono); font-size: 10px; color: var(--dim); }
    .d-action-time { font-family: var(--mono); font-size: 10px; color: var(--dim); flex-shrink: 0; }
    .d-action-status {
      font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .06em;
      padding: 3px 8px; border-radius: 4px; flex-shrink: 0;
    }
    .d-action-status.success   { background: #052e16; color: var(--green); }
    .d-action-status.failure   { background: #450a0a; color: var(--red); }
    .d-action-status.in_progress { background: #1c3a0a; color: var(--yellow); }
    .d-action-status.queued    { background: var(--card); color: var(--dim); }
    .d-action-status.skipped   { background: var(--card); color: var(--dim); }

    /* ── Buttons ── */
    .d-btn {
      font-family: var(--mono); font-size: 11px; letter-spacing: .04em;
      background: var(--surface); color: var(--dim); border: 1px solid var(--border2);
      padding: 7px 14px; border-radius: 6px; cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .d-btn:hover:not(:disabled) { background: var(--card); color: var(--text2); border-color: var(--dim); }
    .d-btn:disabled { opacity: .35; cursor: not-allowed; }
    .d-btn.primary { background: var(--amber); color: #fff; border-color: var(--amber); }
    .d-btn.primary:hover:not(:disabled) { background: var(--amber2); border-color: var(--amber2); }
    .d-btn.danger:hover:not(:disabled) { background: #450a0a; color: var(--red); border-color: var(--red); }
    .d-btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }

    /* ── Schedule form ── */
    .d-form { background: var(--card); border: 1px solid var(--border2); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .d-form-title { font-family: var(--serif); font-size: 15px; color: var(--text3); margin-bottom: 14px; }
    .d-field { margin-bottom: 12px; }
    .d-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); display: block; margin-bottom: 5px; }
    .d-input, .d-select {
      width: 100%; background: var(--surface); border: 1px solid var(--border2); color: var(--text2);
      padding: 9px 12px; border-radius: 6px; font-family: var(--mono); font-size: 12px;
      transition: border-color .15s; outline: none;
    }
    .d-input:focus, .d-select:focus { border-color: var(--amber); }
    .d-select option { background: var(--surface); }

    /* ── Schedule list ── */
    .d-sched-list { display: flex; flex-direction: column; gap: 8px; }
    .d-sched-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px;
    }
    .d-sched-info { flex: 1; min-width: 0; }
    .d-sched-label { font-family: var(--sans); font-size: 13px; color: var(--text2); margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .d-sched-meta  { font-family: var(--mono); font-size: 10px; color: var(--dim); }
    .d-sched-date  { font-family: var(--mono); font-size: 11px; color: var(--amber2); flex-shrink: 0; }

    /* ── Login screen ── */
    #d-login {
      position: fixed; inset: 0; z-index: 99993;
      background: var(--bg); display: flex; align-items: center; justify-content: center;
    }
    .d-login-box { text-align: center; max-width: 320px; padding: 32px; }
    .d-login-logo { font-family: var(--serif); font-size: 32px; color: var(--amber2); margin-bottom: 8px; }
    .d-login-sub  { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-bottom: 28px; }
    .d-login-note { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 16px; line-height: 1.6; }

    /* ── Toast ── */
    #d-toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--card); border: 1px solid var(--border2); color: var(--text2);
      font-family: var(--mono); font-size: 11px; padding: 10px 20px; border-radius: 8px;
      z-index: 99999; transition: transform .3s; pointer-events: none; white-space: nowrap;
    }
    #d-toast.show { transform: translateX(-50%) translateY(0); }
    #d-toast.ok   { border-color: var(--green); color: var(--green); }
    #d-toast.err  { border-color: var(--red);   color: var(--red);   }

    /* ── Empty states ── */
    .d-empty { font-family: var(--mono); font-size: 11px; color: var(--dim); padding: 20px; text-align: center; }

    /* ── Loading ── */
    .d-loading {
      display: inline-block; width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid var(--border2); border-top-color: var(--amber2);
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>
  <!-- Sveltia CMS -->
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js" type="module" data-cfasync="false"></script>

  <!-- Login screen (shown when not authenticated) -->
  <div id="d-login" style="display:none">
    <div class="d-login-box">
      <div class="d-login-logo">ishistory</div>
      <div class="d-login-sub">COMMAND CENTRE</div>
      <button class="d-btn primary" style="width:100%;font-size:13px;padding:12px" onclick="dLogin()">Login with GitHub</button>
      <div class="d-login-note">Uses the same OAuth session as the CMS.<br>One login for both.</div>
    </div>
  </div>

  <!-- FAB -->
  <div id="d-fab" onclick="dToggle()" title="Dashboard">
    <div id="d-fab-dot"></div>
  </div>

  <!-- Overlay backdrop -->
  <div id="d-overlay" onclick="dClose()"></div>

  <!-- Dashboard panel -->
  <div id="d-panel">
    <div id="d-header">
      <div id="d-title">is<span>history</span> · command centre</div>
      <div id="d-last-updated">—</div>
      <button id="d-close" onclick="dClose()">✕</button>
    </div>
    <div id="d-tabs">
      <button class="d-tab active" onclick="dTab('overview',this)">Overview</button>
      <button class="d-tab" onclick="dTab('pipeline',this)">Pipeline</button>
      <button class="d-tab" onclick="dTab('series',this)">Series</button>
      <button class="d-tab" onclick="dTab('schedule',this)">Schedule</button>
      <button class="d-tab" onclick="dTab('actions',this)">Actions</button>
    </div>
    <div id="d-body">

      <!-- OVERVIEW -->
      <div id="view-overview" class="d-view active">
        <div class="d-grid" id="ov-stats"></div>
        <div class="d-section-title">Last Pipeline Run</div>
        <div id="ov-last-run"><div class="d-empty"><span class="d-loading"></span></div></div>
        <div class="d-section-title">Recent Commits</div>
        <div id="ov-commits"><div class="d-empty"><span class="d-loading"></span></div></div>
      </div>

      <!-- PIPELINE -->
      <div id="view-pipeline" class="d-view">
        <div class="d-btn-row">
          <button class="d-btn primary" onclick="dTriggerPipeline()">▶ Run Pipeline</button>
          <button class="d-btn" onclick="loadPipeline()">↺ Refresh</button>
        </div>
        <div id="pipe-trigger-form" style="display:none;margin-bottom:12px">
          <input class="d-input" id="pipe-file-input" placeholder="src/content/ai-history/episode-01.md" style="margin-bottom:8px" />
          <div class="d-btn-row">
            <button class="d-btn primary" onclick="dDoTrigger()">Trigger</button>
            <button class="d-btn" onclick="document.getElementById('pipe-trigger-form').style.display='none'">Cancel</button>
          </div>
        </div>
        <div class="d-section-title">Run History</div>
        <div id="pipe-runs"><div class="d-empty"><span class="d-loading"></span></div></div>
      </div>

      <!-- SERIES -->
      <div id="view-series" class="d-view">
        <div id="series-list"><div class="d-empty"><span class="d-loading"></span></div></div>
      </div>

      <!-- SCHEDULE -->
      <div id="view-schedule" class="d-view">
        <div class="d-form">
          <div class="d-form-title">Schedule a Post</div>
          <div class="d-field">
            <label class="d-label">File</label>
            <select class="d-select" id="sched-file"><option value="">Loading posts…</option></select>
          </div>
          <div class="d-field">
            <label class="d-label">Publish Date & Time (UTC)</label>
            <input class="d-input" type="datetime-local" id="sched-date" />
          </div>
          <div class="d-field">
            <label class="d-label">Label (optional)</label>
            <input class="d-input" type="text" id="sched-label" placeholder="e.g. AI History Episode 26" />
          </div>
          <button class="d-btn primary" onclick="dAddSchedule()">Schedule Post</button>
        </div>
        <div class="d-section-title">Scheduled Posts</div>
        <div id="sched-list"><div class="d-empty"><span class="d-loading"></span></div></div>
      </div>

      <!-- ACTIONS -->
      <div id="view-actions" class="d-view">
        <div class="d-btn-row">
          <button class="d-btn" onclick="loadActions()">↺ Refresh</button>
        </div>
        <div class="d-section-title">Workflow Runs</div>
        <div id="actions-list"><div class="d-empty"><span class="d-loading"></span></div></div>
      </div>

    </div>
  </div>

  <!-- Toast -->
  <div id="d-toast"></div>

<script>
  const REPO    = 'ishaan-00/ishistory';
  const SITE    = 'https://ishistory.pages.dev';
  const GH_API  = 'https://api.github.com';
  let TOKEN     = null;
  let isOpen    = false;
  let fileCache = null;
  let statusCache = null;

  // ── Auth ───────────────────────────────────────────────────────────────────
  function getToken() {
    try {
      // Sveltia CMS stores: { login, name, email, token, ... }
      const u = JSON.parse(localStorage.getItem('sveltia-cms.user') || 'null');
      if (u?.token) return u.token;
    } catch (_) {}
    // Fallback: standalone token
    return localStorage.getItem('d-gh-token');
  }

  function dLogin() {
    // Use same OAuth flow as Sveltia CMS
    const authWorker = 'https://sveltia-cms-auth.aadityadarpan5.workers.dev';
    const popup = window.open(`${authWorker}/auth?provider=github&site_id=${location.host}`, 'login', 'width=600,height=700');
    window.addEventListener('message', function onMsg(e) {
      if (e.data?.startsWith?.('authorization:github:success:')) {
        try {
          const payload = JSON.parse(e.data.replace('authorization:github:success:', ''));
          if (payload.token) {
            localStorage.setItem('d-gh-token', payload.token);
            TOKEN = payload.token;
            document.getElementById('d-login').style.display = 'none';
            dInit();
          }
        } catch (_) {}
        window.removeEventListener('message', onMsg);
      }
    });
  }

  // ── GitHub API ─────────────────────────────────────────────────────────────
  async function gh(endpoint, method = 'GET', body = null) {
    const res = await fetch(`${GH_API}${endpoint}`, {
      method,
      headers: {
        Authorization:  `Bearer ${TOKEN}`,
        Accept:         'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
      },
      body: body ? JSON.stringify(body) : null,
    });
    if (res.status === 204) return null;
    return res.json();
  }

  async function ghFile(path) {
    const d = await gh(`/repos/${REPO}/contents/${path}`);
    if (!d || d.message) return null;
    return { content: atob(d.content.replace(/\n/g, '')), sha: d.sha };
  }

  async function ghWrite(path, content, message, sha = null) {
    const body = { message, content: btoa(unescape(encodeURIComponent(content))), ...(sha ? { sha } : {}) };
    return gh(`/repos/${REPO}/contents/${path}`, 'PUT', body);
  }

  // ── UI helpers ─────────────────────────────────────────────────────────────
  function relTime(s) {
    if (!s) return '—';
    const ms = new Date(s).getTime();
    if (isNaN(ms)) return '—';
    const d = Math.floor((Date.now() - ms) / 1000);
    if (d < 5) return 'just now';
    if (d < 60) return d + 's ago';
    if (d < 3600) return Math.floor(d / 60) + 'm ago';
    if (d < 86400) return Math.floor(d / 3600) + 'h ago';
    return Math.floor(d / 86400) + 'd ago';
  }

  function fmtDate(s) {
    if (!s) return '—';
    return new Date(s).toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', timeZone: 'UTC', timeZoneName: 'short' });
  }

  function fileName(p) { return p ? p.split('/').pop() : p; }

  let toastTimer;
  function toast(msg, type = '') {
    const el = document.getElementById('d-toast');
    el.textContent = msg; el.className = type + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 3000);
  }

  function platDot(r) {
    if (r.skipped) return `<span class="d-platform skip">⊘ skipped</span>`;
    if (r.ok) return `<span class="d-platform ok">✓</span>`;
    return `<span class="d-platform fail" title="${r.err || ''}">✗</span>`;
  }

  function platRow(results) {
    const platforms = ['discord', 'devto', 'hashnode', 'ntfy', 'indexnow'];
    return `<div class="d-platform-grid">${platforms.map(p => {
      const r = results[p] || {};
      const cls = r.skipped ? 'skip' : r.ok ? 'ok' : 'fail';
      const icon = r.skipped ? '⊘' : r.ok ? '✓' : '✗';
      const title = r.err ? ` title="${r.err.slice(0, 120)}"` : '';
      return `<span class="d-platform ${cls}"${title}>${icon} ${p}</span>`;
    }).join('')}</div>`;
  }

  // ── Toggle & tabs ──────────────────────────────────────────────────────────
  function dToggle() { isOpen ? dClose() : dOpen(); }
  function dOpen() {
    isOpen = true;
    document.getElementById('d-panel').classList.add('open');
    document.getElementById('d-overlay').classList.add('open');
    dRefresh();
  }
  function dClose() {
    isOpen = false;
    document.getElementById('d-panel').classList.remove('open');
    document.getElementById('d-overlay').classList.remove('open');
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && isOpen) dClose(); });

  let activeTab = 'overview';
  function dTab(name, btn) {
    activeTab = name;
    document.querySelectorAll('.d-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.d-view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    if (name === 'overview') loadOverview();
    if (name === 'pipeline') loadPipeline();
    if (name === 'series')   loadSeries();
    if (name === 'schedule') loadSchedule();
    if (name === 'actions')  loadActions();
  }

  // ── Status.json ────────────────────────────────────────────────────────────
  async function fetchStatus() {
    const f = await ghFile('src/data/status.json').catch(() => null);
    if (!f) return { runs: [] };
    try { return JSON.parse(f.content); }
    catch (_) { return { runs: [] }; }
  }

  // ── File tree ──────────────────────────────────────────────────────────────
  async function fetchFileTree() {
    if (fileCache) return fileCache;
    const data = await gh(`/repos/${REPO}/git/trees/main?recursive=1`);
    fileCache = (data?.tree || []).filter(f => f.type === 'blob');
    return fileCache;
  }

  // ── Overview ───────────────────────────────────────────────────────────────
  async function loadOverview() {
    const [status, tree, commits] = await Promise.all([
      fetchStatus(),
      fetchFileTree(),
      gh(`/repos/${REPO}/commits?per_page=5`).catch(() => []),
    ]);

    // Stats cards
    const posts = tree.filter(f => f.path.startsWith('src/content/') && f.path.endsWith('.md'));
    const series = {};
    for (const f of posts) {
      const s = f.path.split('/')[2];
      if (s) series[s] = (series[s] || 0) + 1;
    }
    const lastRun = status.runs?.[0];
    const allOk = lastRun ? Object.values({discord:lastRun.discord,devto:lastRun.devto,hashnode:lastRun.hashnode,ntfy:lastRun.ntfy,indexnow:lastRun.indexnow}).filter(r=>!r.skipped).every(r=>r.ok) : null;

    document.getElementById('ov-stats').innerHTML = `
      <div class="d-card">
        <div class="d-card-title">Total Posts</div>
        <div class="d-card-val">${posts.length}</div>
        <div class="d-card-sub">${Object.keys(series).length} series</div>
      </div>
      <div class="d-card">
        <div class="d-card-title">Last Pipeline</div>
        <div class="d-card-val" style="font-size:18px;font-family:var(--mono)">${lastRun ? relTime(lastRun.ran_at) : '—'}</div>
        <div class="d-card-sub" style="color:${allOk===true?'var(--green)':allOk===false?'var(--red)':'var(--dim)'}">${allOk===true?'All platforms OK':allOk===false?'Some failures':'No runs yet'}</div>
      </div>
      <div class="d-card">
        <div class="d-card-title">Scheduled</div>
        <div class="d-card-val" id="ov-sched-count">—</div>
        <div class="d-card-sub">pending posts</div>
      </div>`;

    // Load scheduled count
    ghFile('src/data/scheduled.json').then(f => {
      try {
        const n = f ? JSON.parse(f.content).length : 0;
        const el = document.getElementById('ov-sched-count');
        if (el) el.textContent = n;
      } catch(_) {}
    }).catch(() => {});

    // Fab dot
    const dot = document.getElementById('d-fab-dot');
    dot.className = allOk === false ? 'red' : allOk === true ? 'green' : 'amber';

    // Last run
    if (lastRun) {
      document.getElementById('ov-last-run').innerHTML = `
        <div class="d-run">
          <div class="d-run-top">
            <div class="d-run-file">${lastRun.file}</div>
            <div class="d-run-time">${relTime(lastRun.ran_at)}</div>
          </div>
          ${platRow(lastRun)}
          ${['discord','devto','hashnode','ntfy','indexnow'].filter(p=>lastRun[p]?.err).map(p=>`<div class="d-run-err">${p}: ${lastRun[p].err.slice(0,200)}</div>`).join('')}
        </div>`;
    } else {
      document.getElementById('ov-last-run').innerHTML = '<div class="d-empty">No pipeline runs yet</div>';
    }

    // Commits
    if (commits?.length) {
      document.getElementById('ov-commits').innerHTML = `<div class="d-action-list">${(commits||[]).map(c => `
        <a class="d-action-run" href="${c.html_url}" target="_blank" rel="noopener">
          <div class="d-action-name">${c.commit.message.split('\n')[0]}</div>
          <div class="d-action-time">${relTime(c.commit.author.date)}</div>
          <div class="d-action-branch" style="font-size:9px;color:var(--dim)">${c.sha.slice(0,7)}</div>
        </a>`).join('')}</div>`;
    } else {
      document.getElementById('ov-commits').innerHTML = '<div class="d-empty">No commits</div>';
    }

    document.getElementById('d-last-updated').textContent = 'updated ' + relTime(new Date().toISOString());
  }

  // ── Pipeline ───────────────────────────────────────────────────────────────
  async function loadPipeline() {
    document.getElementById('pipe-runs').innerHTML = '<div class="d-empty"><span class="d-loading"></span></div>';
    const status = await fetchStatus();
    const runs = status.runs || [];
    if (!runs.length) {
      document.getElementById('pipe-runs').innerHTML = '<div class="d-empty">No pipeline runs recorded yet</div>';
      return;
    }
    document.getElementById('pipe-runs').innerHTML = `<div class="d-run-list">${runs.map(r => `
      <div class="d-run">
        <div class="d-run-top">
          <div class="d-run-file">${r.file}</div>
          <div class="d-run-time">${relTime(r.ran_at)}</div>
        </div>
        <div class="d-run-commit" style="margin-bottom:8px">commit <span style="color:var(--amber3)">${r.commit}</span></div>
        ${platRow(r)}
        ${['discord','devto','hashnode','ntfy','indexnow'].filter(p=>r[p]?.err).map(p=>`<div class="d-run-err">${p}: ${(r[p].err||'').slice(0,200)}</div>`).join('')}
      </div>`).join('')}</div>`;
  }

  function dTriggerPipeline() {
    const form = document.getElementById('pipe-trigger-form');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
  }

  async function dDoTrigger() {
    const file = document.getElementById('pipe-file-input').value.trim();
    if (!file) { toast('Enter a file path', 'err'); return; }
    try {
      await gh(`/repos/${REPO}/actions/workflows/on-publish.yml/dispatches`, 'POST', { ref: 'main', inputs: { file } });
      toast('Pipeline triggered ✓', 'ok');
      document.getElementById('pipe-trigger-form').style.display = 'none';
      setTimeout(loadActions, 2000);
    } catch(e) { toast('Failed: ' + e.message, 'err'); }
  }

  // ── Series ─────────────────────────────────────────────────────────────────
  async function loadSeries() {
    document.getElementById('series-list').innerHTML = '<div class="d-empty"><span class="d-loading"></span></div>';
    const tree = await fetchFileTree();
    const posts = tree.filter(f => f.path.startsWith('src/content/') && f.path.endsWith('.md'));
    const series = {};
    for (const f of posts) {
      const [,, s, fn] = f.path.split('/');
      if (!s || !fn) continue;
      if (!series[s]) series[s] = { episodes: [], profiles: [] };
      const num = fn.match(/\d+/);
      const n = num ? parseInt(num[0]) : null;
      if (fn.startsWith('profile')) series[s].profiles.push(n);
      else series[s].episodes.push(n);
    }

    if (!Object.keys(series).length) {
      document.getElementById('series-list').innerHTML = '<div class="d-empty">No series found</div>';
      return;
    }

    const cards = Object.entries(series).map(([name, data]) => {
      const eps  = data.episodes.filter(Boolean).sort((a,b)=>a-b);
      const pros = data.profiles.filter(Boolean).sort((a,b)=>a-b);
      const gaps = [];
      for (let i = 1; i < eps.length; i++) for (let g = eps[i-1]+1; g < eps[i]; g++) gaps.push(g);
      const next = eps.length ? Math.max(...eps) + 1 : 1;
      const pct  = Math.min(100, Math.round((eps.length % 10 || (eps.length > 0 ? 10 : 0)) / 10 * 100));

      return `<div class="d-series">
        <div class="d-series-top">
          <div class="d-series-name">${name.replace(/-/g,' ')}</div>
          <span class="d-series-badge active">active</span>
        </div>
        <div class="d-progress"><div class="d-progress-fill active" style="width:${pct}%"></div></div>
        <div class="d-series-stats">
          <span>${eps.length} episode${eps.length!==1?'s':''}</span>
          ${pros.length ? `<span>${pros.length} profile${pros.length!==1?'s':''}</span>` : ''}
          <span class="next">next: #${next}</span>
          ${gaps.length ? `<span class="gap">gaps: ${gaps.join(', ')}</span>` : ''}
        </div>
      </div>`;
    });

    document.getElementById('series-list').innerHTML = `<div class="d-series-list">${cards.join('')}</div>`;
  }

  // ── Schedule ───────────────────────────────────────────────────────────────
  async function loadSchedule() {
    // Populate file dropdown
    const tree = await fetchFileTree();
    const mdFiles = tree.filter(f => f.path.startsWith('src/content/') && f.path.endsWith('.md'))
      .map(f => f.path).sort();
    const sel = document.getElementById('sched-file');
    sel.innerHTML = `<option value="">Select a post…</option>` +
      mdFiles.map(f => `<option value="${f}">${f.split('/').slice(2).join('/')}</option>`).join('');

    // Load scheduled.json
    await renderScheduleList();
  }

  async function renderScheduleList() {
    document.getElementById('sched-list').innerHTML = '<div class="d-empty"><span class="d-loading"></span></div>';
    const f = await ghFile('src/data/scheduled.json').catch(() => null);
    let items = [];
    try { if (f) items = JSON.parse(f.content); } catch(_) {}

    if (!items.length) {
      document.getElementById('sched-list').innerHTML = '<div class="d-empty">No scheduled posts</div>';
      return;
    }

    items.sort((a, b) => new Date(a.publish_at) - new Date(b.publish_at));
    document.getElementById('sched-list').innerHTML = `<div class="d-sched-list">${items.map(item => `
      <div class="d-sched-item">
        <div class="d-sched-info">
          <div class="d-sched-label">${item.label || fileName(item.file)}</div>
          <div class="d-sched-meta">${item.file}</div>
        </div>
        <div class="d-sched-date">${fmtDate(item.publish_at)}</div>
        <button class="d-btn danger" style="padding:5px 10px;font-size:10px" onclick="dRemoveSchedule('${item.id}')">✕</button>
      </div>`).join('')}</div>`;
  }

  async function dAddSchedule() {
    const file = document.getElementById('sched-file').value;
    const date = document.getElementById('sched-date').value;
    const label = document.getElementById('sched-label').value.trim();
    if (!file) { toast('Select a file', 'err'); return; }
    if (!date) { toast('Pick a date', 'err'); return; }

    const f = await ghFile('src/data/scheduled.json').catch(() => null);
    let items = [];
    try { if (f) items = JSON.parse(f.content); } catch(_) {}

    items.push({
      id:         'sched-' + Date.now(),
      file,
      publish_at: new Date(date).toISOString(),
      label:      label || fileName(file),
      added_at:   new Date().toISOString(),
    });

    await ghWrite('src/data/scheduled.json', JSON.stringify(items, null, 2),
      `chore: schedule ${fileName(file)} [skip ci]`, f?.sha || null);

    toast('Scheduled ✓', 'ok');
    document.getElementById('sched-label').value = '';
    document.getElementById('sched-date').value = '';
    document.getElementById('sched-file').value = '';
    await renderScheduleList();
  }

  async function dRemoveSchedule(id) {
    const f = await ghFile('src/data/scheduled.json').catch(() => null);
    if (!f) return;
    let items = [];
    try { items = JSON.parse(f.content); } catch(_) {}
    const updated = items.filter(i => i.id !== id);
    await ghWrite('src/data/scheduled.json', JSON.stringify(updated, null, 2),
      `chore: remove scheduled post [skip ci]`, f.sha);
    toast('Removed ✓', 'ok');
    await renderScheduleList();
  }

  // ── Actions ────────────────────────────────────────────────────────────────
  async function loadActions() {
    document.getElementById('actions-list').innerHTML = '<div class="d-empty"><span class="d-loading"></span></div>';
    const data = await gh(`/repos/${REPO}/actions/runs?per_page=15`).catch(() => null);
    const runs = data?.workflow_runs || [];
    if (!runs.length) {
      document.getElementById('actions-list').innerHTML = '<div class="d-empty">No workflow runs</div>';
      return;
    }
    document.getElementById('actions-list').innerHTML = `<div class="d-action-list">${runs.map(r => {
      const cls = r.conclusion || r.status || 'queued';
      const label = r.conclusion || r.status || 'queued';
      return `<a class="d-action-run" href="${r.html_url}" target="_blank" rel="noopener">
        <div class="d-action-name">${r.name} — ${r.display_title || r.head_commit?.message?.split('\n')[0] || ''}</div>
        <div class="d-action-branch">${r.head_branch}</div>
        <div class="d-action-time">${relTime(r.created_at)}</div>
        <span class="d-action-status ${cls}">${label}</span>
      </a>`;
    }).join('')}</div>`;
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  function dRefresh() {
    if (activeTab === 'overview')  loadOverview();
    if (activeTab === 'pipeline')  loadPipeline();
    if (activeTab === 'series')    loadSeries();
    if (activeTab === 'schedule')  loadSchedule();
    if (activeTab === 'actions')   loadActions();
  }

  async function dInit() {
    TOKEN = getToken();
    if (!TOKEN) {
      document.getElementById('d-login').style.display = 'flex';
      return;
    }
    // Prefetch status.json to set FAB dot colour immediately
    fetchStatus().then(s => {
      const last = s.runs?.[0];
      if (!last) return;
      const active = ['discord','devto','hashnode','ntfy','indexnow']
        .map(p => last[p]).filter(r => !r?.skipped);
      const allOk = active.every(r => r?.ok);
      document.getElementById('d-fab-dot').className = allOk ? 'green' : 'red';
    }).catch(() => {});
  }

  dInit();
</script>
</body>
</html>
