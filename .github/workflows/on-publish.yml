name: Publish Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'src/content/**/*.md'
  workflow_dispatch:
    inputs:
      file:
        description: 'File to process (repo-relative path)'
        required: true
        type: string
      dry_run:
        description: 'Dry run — generate and preview without posting'
        required: false
        type: boolean
        default: false

concurrency:
  group: publish-pipeline
  cancel-in-progress: false   # never cancel a running publish mid-flight

jobs:
  # ── Step 1: Validate frontmatter ────────────────────────────────────────────
  validate:
    name: Validate frontmatter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    outputs:
      valid_new_files: ${{ steps.run.outputs.valid_new_files }}
      has_new_files:   ${{ steps.run.outputs.has_new_files }}
      passed:          ${{ steps.run.outputs.passed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for cross-file duplicate checks

      - name: Detect changed files
        if: github.event_name == 'push'
        id: changed
        uses: tj-actions/changed-files@v44
        with:
          files: 'src/content/**/*.md'
          since_last_remote_commit: true
          separator: ','

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run validation
        id: run
        env:
          ADDED_FILES:    ${{ steps.changed.outputs.added_files }}
          MODIFIED_FILES: ${{ steps.changed.outputs.modified_files }}
          MANUAL_FILE:    ${{ github.event.inputs.file }}
          GIT_EVENT:      ${{ github.event_name }}
        run: node .github/scripts/validate.mjs

  # ── Step 2: Publish (only runs if validate passed) ──────────────────────────
  pipeline:
    name: Distribute to social platforms
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    if: |
      needs.validate.outputs.passed == 'true' &&
      (needs.validate.outputs.has_new_files == 'true' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write   # commits status.json and post-ids.json back to repo
      models:   read    # GitHub Models API (gpt-4o-mini) for article generation

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run publish pipeline
        env:
          DEVTO_API_KEY:            ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_API_KEY:         ${{ secrets.HASHNODE_API_KEY }}
          HASHNODE_PUBLICATION_ID:  ${{ secrets.HASHNODE_PUBLICATION_ID }}
          DISCORD_WEBHOOK_ARTICLES: ${{ secrets.DISCORD_WEBHOOK_ARTICLES }}
          NTFY_TOPIC:               ${{ secrets.NTFY_TOPIC }}
          INDEXNOW_KEY:             ${{ secrets.INDEXNOW_KEY }}
          WORKER_URL:               ${{ secrets.WORKER_URL }}
          CMS_API_KEY:              ${{ secrets.CMS_API_KEY }}
          GITHUB_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
          GIT_SHA:                  ${{ github.sha }}
          GIT_REPO:                 ${{ github.repository }}
        run: |
          EXIT_CODE=0
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            DRY_RUN_FLAG="--dry-run"
            echo "ℹ Dry run mode — no posts will be made"
          fi

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Processing: ${{ github.event.inputs.file }}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            node .github/scripts/pipeline.mjs "${{ github.event.inputs.file }}" $DRY_RUN_FLAG || EXIT_CODE=$?
          else
            IFS=',' read -r -a files <<< "${{ needs.validate.outputs.valid_new_files }}"
            for file in "${files[@]}"; do
              if [ -n "$file" ]; then
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "Processing: $file"
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                node .github/scripts/pipeline.mjs "$file" $DRY_RUN_FLAG || EXIT_CODE=$?
              fi
            done
          fi
          exit $EXIT_CODE

      - name: Pipeline summary
        if: always()
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "## Publish Pipeline Complete (Manual)" >> $GITHUB_STEP_SUMMARY
            echo "- \`${{ github.event.inputs.file }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Publish Pipeline Complete" >> $GITHUB_STEP_SUMMARY
            IFS=',' read -r -a files <<< "${{ needs.validate.outputs.valid_new_files }}"
            for file in "${files[@]}"; do
              [ -n "$file" ] && echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
            done
          fi
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "> ⚠️ **Dry run** — no posts were published" >> $GITHUB_STEP_SUMMARY
          fi
