name: Publish Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'src/content/**/*.md'
  workflow_dispatch:                          # ← ADDED: enables manual trigger
    inputs:
      file:
        description: 'File to process (e.g. src/content/ai-history/episode-01.md)'
        required: true

concurrency:
  group: publish-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    name: Distribute to social platforms
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new content files
        id: changed
        uses: tj-actions/changed-files@v44
        with:
          files: 'src/content/**/*.md'
          since_last_remote_commit: true

      - name: Log detected files
        run: |
          echo "Added files:    ${{ steps.changed.outputs.added_files }}"
          echo "Modified files: ${{ steps.changed.outputs.modified_files }}"
          if [ -z "${{ steps.changed.outputs.added_files }}" ]; then
            echo "No new posts detected — only edits or non-content files changed."
          fi

      - name: Setup Node.js
        if: steps.changed.outputs.added_files != '' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.changed.outputs.added_files != '' || github.event_name == 'workflow_dispatch'
        run: npm install --no-save gray-matter

      - name: Run publish pipeline
        if: steps.changed.outputs.added_files != '' || github.event_name == 'workflow_dispatch'
        env:
          DEVTO_API_KEY:            ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_API_KEY:         ${{ secrets.HASHNODE_API_KEY }}
          HASHNODE_PUBLICATION_ID:  ${{ secrets.HASHNODE_PUBLICATION_ID }}
          DISCORD_WEBHOOK_ARTICLES: ${{ secrets.DISCORD_WEBHOOK_ARTICLES }}
          NTFY_TOPIC:               ${{ secrets.NTFY_TOPIC }}
          INDEXNOW_KEY:             ${{ secrets.INDEXNOW_KEY }}
          WORKER_URL:               ${{ secrets.WORKER_URL }}
          CMS_API_KEY:              ${{ secrets.CMS_API_KEY }}
          GIT_SHA:                  ${{ github.sha }}
          GIT_REPO:                 ${{ github.repository }}
        run: |                                # ← CHANGED: handles both auto and manual
          FILE="${{ github.event.inputs.file || '' }}"
          ADDED="${{ steps.changed.outputs.added_files || '' }}"
          FILES="${FILE:-$ADDED}"
          EXIT_CODE=0
          for file in $FILES; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Processing: $file"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            node .github/scripts/pipeline.mjs "$file" || EXIT_CODE=$?
          done
          exit $EXIT_CODE

      - name: Pipeline summary
        if: always()
        run: |
          if [ -z "${{ steps.changed.outputs.added_files }}" ] && [ -z "${{ github.event.inputs.file }}" ]; then
            echo "## No new posts in this push" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Publish Pipeline Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          fi
