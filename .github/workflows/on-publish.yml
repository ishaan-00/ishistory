name: Publish Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'src/content/**/*.md'
  workflow_dispatch:
    inputs:
      file:
        description: 'File to process'
        required: true
        type: string

# Never cancel a running pipeline — always finish what was started
concurrency:
  group: publish-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    name: Distribute to social platforms
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # needed to commit status.json back to repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new content files
        if: github.event_name == 'push'
        id: changed
        uses: tj-actions/changed-files@v44
        with:
          files: 'src/content/**/*.md'
          since_last_remote_commit: true
          separator: ','

      - name: Log detected files
        if: github.event_name == 'push'
        run: |
          echo "Added:    ${{ steps.changed.outputs.added_files }}"
          echo "Modified: ${{ steps.changed.outputs.modified_files }}"
          if [ -z "${{ steps.changed.outputs.added_files }}" ]; then
            echo "No new posts — only edits or non-content changes."
          fi

      - name: Setup Node.js
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.added_files != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run publish pipeline
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.added_files != ''
        env:
          DEVTO_API_KEY:            ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_API_KEY:         ${{ secrets.HASHNODE_API_KEY }}
          HASHNODE_PUBLICATION_ID:  ${{ secrets.HASHNODE_PUBLICATION_ID }}
          DISCORD_WEBHOOK_ARTICLES: ${{ secrets.DISCORD_WEBHOOK_ARTICLES }}
          NTFY_TOPIC:               ${{ secrets.NTFY_TOPIC }}
          INDEXNOW_KEY:             ${{ secrets.INDEXNOW_KEY }}
          WORKER_URL:               ${{ secrets.WORKER_URL }}
          CMS_API_KEY:              ${{ secrets.CMS_API_KEY }}
          GITHUB_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
          HF_TOKEN:                 ${{ secrets.HF_TOKEN }}
          GIT_SHA:                  ${{ github.sha }}
          GIT_REPO:                 ${{ github.repository }}
        run: |
          EXIT_CODE=0
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Processing scheduled file: ${{ github.event.inputs.file }}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            node .github/scripts/pipeline.mjs "${{ github.event.inputs.file }}" || EXIT_CODE=$?
          else
            IFS=',' read -r -a files <<< "${{ steps.changed.outputs.added_files }}"
            for file in "${files[@]}"; do
              if [ -n "$file" ]; then
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "Processing: $file"
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                node .github/scripts/pipeline.mjs "$file" || EXIT_CODE=$?
              fi
            done
          fi
          exit $EXIT_CODE

      - name: Pipeline summary
        if: always()
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "## Publish Pipeline Complete (Scheduled)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**File processed:**" >> $GITHUB_STEP_SUMMARY
            echo "- \`${{ github.event.inputs.file }}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          else
            if [ -z "${{ steps.changed.outputs.added_files }}" ]; then
              echo "## No new posts in this push" >> $GITHUB_STEP_SUMMARY
            else
              echo "## Publish Pipeline Complete" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Files processed:**" >> $GITHUB_STEP_SUMMARY
              IFS=',' read -r -a files <<< "${{ steps.changed.outputs.added_files }}"
              for file in "${files[@]}"; do
                if [ -n "$file" ]; then
                  echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
                fi
              done
              echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
