name: Publish Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'src/content/**/*.md'
  # Add this to allow manual triggers from your CMS and daily script
  workflow_dispatch:
    inputs:
      file:
        description: 'File to publish (e.g. src/content/ai-history/episode-01.md)'
        required: true
        type: string

# Never cancel a running pipeline — always finish what was started
concurrency:
  group: publish-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    name: Distribute to social platforms
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # needed to commit status.json back to repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Only run tj-actions/changed-files if triggered by a push
      - name: Detect new content files
        id: changed
        if: github.event_name == 'push'
        uses: tj-actions/changed-files@v44
        with:
          files: 'src/content/**/*.md'
          since_last_remote_commit: true

      # Combine logic: use inputs.file for dispatch, added_files for push
      - name: Determine files to process
        id: target
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "files=${{ inputs.file }}" >> $GITHUB_OUTPUT
          else
            echo "files=${{ steps.changed.outputs.added_files }}" >> $GITHUB_OUTPUT
          fi

      - name: Log detected files
        run: |
          echo "Files to process: ${{ steps.target.outputs.files }}"
          if [ -z "${{ steps.target.outputs.files }}" ]; then
            echo "No new posts — only edits or non-content changes."
          fi

      - name: Setup Node.js
        if: steps.target.outputs.files != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run publish pipeline
        if: steps.target.outputs.files != ''
        env:
          DEVTO_API_KEY:            ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_API_KEY:         ${{ secrets.HASHNODE_API_KEY }}
          HASHNODE_PUBLICATION_ID:  ${{ secrets.HASHNODE_PUBLICATION_ID }}
          DISCORD_WEBHOOK_ARTICLES: ${{ secrets.DISCORD_WEBHOOK_ARTICLES }}
          NTFY_TOPIC:               ${{ secrets.NTFY_TOPIC }}
          INDEXNOW_KEY:             ${{ secrets.INDEXNOW_KEY }}
          WORKER_URL:               ${{ secrets.WORKER_URL }}
          CMS_API_KEY:              ${{ secrets.CMS_API_KEY }}
          GITHUB_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
          HF_TOKEN:                 ${{ secrets.HF_TOKEN }}
          GIT_SHA:                  ${{ github.sha }}
          GIT_REPO:                 ${{ github.repository }}
        run: |
          EXIT_CODE=0
          # Use a while-read loop to safely handle filenames with spaces
          echo "${{ steps.target.outputs.files }}" | tr ' ' '\n' | while read -r file; do
            if [ -n "$file" ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "Processing: $file"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              node .github/scripts/pipeline.mjs "$file" || EXIT_CODE=$?
            fi
          done
          exit $EXIT_CODE

      - name: Pipeline summary
        if: always()
        run: |
          if [ -z "${{ steps.target.outputs.files }}" ]; then
            echo "## No new posts to process" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Publish Pipeline Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Files processed:**" >> $GITHUB_STEP_SUMMARY
            # Safe loop for summary too
            echo "${{ steps.target.outputs.files }}" | tr ' ' '\n' | while read -r file; do
              if [ -n "$file" ]; then
                echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
              fi
            done
            echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          
