name: Daily

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC every day
  workflow_dispatch:       # manual trigger for testing

jobs:
  daily:
    name: Today in History + Scheduled Posts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # update scheduled.json after dispatching due posts
      actions:  write   # dispatch workflow_dispatch on on-publish.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run daily tasks
        env:
          # Only the vars daily.mjs actually reads — platform API keys are
          # not used here; they are passed in on-publish.yml instead.
          DISCORD_WEBHOOK_TODAY:    ${{ secrets.DISCORD_WEBHOOK_TODAY }}
          DISCORD_WEBHOOK_ARTICLES: ${{ secrets.DISCORD_WEBHOOK_ARTICLES }}
          GITHUB_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
          GIT_REPO:                 ${{ github.repository }}
        run: node .github/scripts/daily.mjs

      - name: Summary
        if: always()
        run: |
          echo "## Daily Run — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "Today in History posted to Discord + scheduled posts dispatched." >> $GITHUB_STEP_SUMMARY
